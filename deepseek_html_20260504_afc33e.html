<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Кот Учёный — v14 Final</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3B82F6">
    <style>
        :root {
            --math-primary: #3B82F6; --math-light: #EFF6FF; --math-gradient: linear-gradient(135deg, #3B82F6, #1D4ED8);
            --rus-primary: #7C3AED; --rus-light: #F5F3FF; --rus-gradient: linear-gradient(135deg, #7C3AED, #5B21B6);
            --green: #10B981; --green-light: #D1FAE5; --red: #EF4444; --red-light: #FEE2E2;
            --orange: #F59E0B; --gold: #FBBF24; --gold-light: #FEF3C7;
            --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; --text-light: #94A3B8;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #E2E8F0 0%, #F1F5F9 100%); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 12px; user-select: none; -webkit-tap-highlight-color: transparent;
        }
        .app { 
            width: 100%; max-width: 420px; background: var(--bg); 
            border-radius: 24px; box-shadow: var(--shadow-lg); overflow: hidden; 
            display: flex; flex-direction: column; height: 93vh; max-height: 860px; position: relative;
        }
        .header { padding: 14px 16px 10px; color: white; z-index: 10; transition: background 0.4s ease; }
        .header.math-header { background: var(--math-gradient); }
        .header.rus-header { background: var(--rus-gradient); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .header-left { display: flex; align-items: center; gap: 10px; }
        .cat-avatar { 
            width: 40px; height: 40px; background: rgba(255,255,255,0.2); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; cursor: pointer; border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease; backdrop-filter: blur(4px);
        }
        .cat-avatar:active { transform: scale(0.9); }
        .header-app-name { font-size: 16px; font-weight: 800; }
        .header-stats { display: flex; gap: 8px; font-size: 12px; font-weight: 700; }
        .stat { 
            display: flex; align-items: center; gap: 4px; 
            background: rgba(255,255,255,0.15); padding: 6px 12px; 
            border-radius: 20px; backdrop-filter: blur(4px);
        }
        .subject-switch { 
            display: flex; background: rgba(255,255,255,0.2); 
            border-radius: 14px; padding: 3px; backdrop-filter: blur(4px);
        }
        .subject-btn { 
            flex: 1; padding: 9px 12px; border: none; background: transparent; 
            border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; 
            transition: all 0.3s ease; color: rgba(255,255,255,0.8); 
            font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .subject-btn.active { background: white; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .cat-stage { 
            padding: 8px 16px 4px; display: flex; flex-direction: column; 
            align-items: center; min-height: 80px; justify-content: flex-end; 
            transition: all 0.4s ease;
        }
        .cat-stage.math-stage { background: linear-gradient(180deg, #DBEAFE 0%, #F8FAFC 100%); }
        .cat-stage.rus-stage { background: linear-gradient(180deg, #EDE9FE 0%, #F8FAFC 100%); }
        .cat-speech-bubble { 
            background: white; padding: 8px 14px; border-radius: 16px 16px 16px 4px; 
            box-shadow: var(--shadow-sm); font-size: 12px; font-weight: 600; 
            color: var(--text); max-width: 220px; text-align: center; margin-bottom: 4px; 
            animation: floatBubble 3s ease-in-out infinite; transition: all 0.3s ease;
        }
        @keyframes floatBubble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
        .cat-emoji { font-size: 44px; cursor: pointer; transition: all 0.3s ease; line-height: 1; position: relative; }
        .cat-emoji:active { transform: scale(0.9); }
        .cat-emoji.petted { animation: purr 0.6s ease; }
        @keyframes purr { 0%{transform:translateX(0)} 25%{transform:translateX(-5px) rotate(-3deg)} 50%{transform:translateX(5px) rotate(3deg)} 75%{transform:translateX(-3px)} 100%{transform:translateX(0)} }
        .hearts-particle { 
            position: absolute; font-size: 16px; pointer-events: none; 
            animation: floatUp 1s ease forwards; opacity: 0; 
        }
        @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-50px) scale(1.8);opacity:0} }
        
        .main-content { flex: 1; overflow-y: auto; padding: 6px 12px 8px; }
        .main-content::-webkit-scrollbar { width: 0; }
        .section-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        
        /* Дерево навыков */
        .skill-path { position: relative; padding-left: 20px; }
        .skill-node { position: relative; margin-bottom: 4px; }
        .skill-node::before { content: ''; position: absolute; left: -14px; top: 0; width: 2px; height: 100%; background: #E2E8F0; border-radius: 2px; }
        .skill-node:first-child::before { top: 50%; height: 50%; }
        .skill-node:last-child::before { height: 50%; }
        .skill-node.completed::before { background: var(--green); }
        .skill-node::after { content: ''; position: absolute; left: -18px; top: 20px; width: 9px; height: 9px; border-radius: 50%; background: #E2E8F0; border: 2px solid #F8FAFC; z-index: 2; transition: all 0.3s ease; }
        .skill-node.completed::after { background: var(--green); transform: scale(1.2); }
        .skill-node.current::after { background: white; border: 2px solid var(--green); box-shadow: 0 0 0 4px rgba(16,185,129,0.2); animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 4px rgba(16,185,129,0.2)} 50%{box-shadow:0 0 0 8px rgba(16,185,129,0.1)} }
        .skill-card { 
            background: white; border-radius: 12px; padding: 10px 12px; 
            box-shadow: var(--shadow-sm); cursor: pointer; transition: all 0.25s ease; 
            display: flex; align-items: center; gap: 10px; border: 2px solid transparent; 
        }
        .skill-card:active { transform: scale(0.97); }
        .skill-card.locked { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.3); }
        .skill-card.current { border-color: var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,0.1); animation: glow 2s infinite; }
        @keyframes glow { 0%,100%{box-shadow:0 0 0 3px rgba(16,185,129,0.1)} 50%{box-shadow:0 0 0 6px rgba(16,185,129,0.05)} }
        .skill-icon-box { width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.3s ease; }
        .skill-info { flex: 1; min-width: 0; }
        .skill-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
        .skill-progress-text { font-size: 10px; color: var(--text-light); font-weight: 600; }
        .skill-progress-bar { height: 4px; background: #F1F5F9; border-radius: 4px; margin-top: 3px; overflow: hidden; }
        .skill-progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .skill-badge { font-size: 16px; flex-shrink: 0; transition: all 0.3s ease; }
        
        /* Навигация */
        .bottom-nav { display: flex; background: white; padding: 6px 4px 10px; border-top: 1px solid #F1F5F9; gap: 2px; }
        .nav-btn { flex: 1; padding: 6px 2px; border: none; background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; font-family: inherit; color: #94A3B8; font-size: 10px; font-weight: 700; transition: all 0.2s ease; border-radius: 10px; position: relative; }
        .nav-btn.active { color: var(--math-primary); }
        .rus-mode .nav-btn.active { color: var(--rus-primary); }
        .nav-icon { font-size: 20px; transition: transform 0.2s ease; }
        .nav-btn:active .nav-icon { transform: scale(0.85); }
        .nav-badge { position: absolute; top: 0; right: 4px; background: var(--red); color: white; font-size: 9px; font-weight: 800; min-width: 16px; height: 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; animation: badge-pop 0.3s ease; }
        @keyframes badge-pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
        
        /* Тост */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-130px); background: #1E293B; color: white; padding: 10px 18px; border-radius: 24px; font-weight: 700; font-size: 13px; z-index: 600; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 6px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .achievement-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-160px); background: linear-gradient(135deg, #1E293B, #334155); color: var(--gold); padding: 14px 22px; border-radius: 20px; font-weight: 800; font-size: 14px; z-index: 700; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 10px; box-shadow: 0 12px 40px rgba(0,0,0,0.5); pointer-events: none; border: 1px solid rgba(251,191,36,0.3); }
        .achievement-toast.show { transform: translateX(-50%) translateY(0); }
        
        /* Панели */
        .panel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(4px); }
        .panel-overlay.active { opacity: 1; pointer-events: all; }
        .panel-card { background: white; border-radius: 22px; padding: 22px 18px 18px; width: 90%; max-width: 370px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0%{transform:scale(0.9);opacity:0} 100%{transform:scale(1);opacity:1} }
        
        /* УРОК */
        .lesson-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .lesson-overlay.active { opacity: 1; pointer-events: all; }
        .lesson-container { width: 92%; max-width: 390px; max-height: 88vh; border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0,0,0,0.5); animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .lesson-container.math-lesson { background: linear-gradient(180deg, #0F172A 0%, #1E293B 100%); }
        .lesson-container.rus-lesson { background: linear-gradient(180deg, #1E0A3C 0%, #2D1154 100%); }
        @keyframes slideUp { 0%{transform:translateY(50px);opacity:0} 100%{transform:translateY(0);opacity:1} }
        .lesson-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .lesson-header.math-bar { background: rgba(30,41,59,0.8); }
        .lesson-header.rus-bar { background: rgba(45,17,84,0.8); }
        .lesson-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .lesson-close:hover { background: rgba(255,255,255,0.2); }
        .lesson-title { font-weight: 800; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .lesson-steps { display: flex; gap: 3px; }
        .lstep-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: all 0.3s ease; }
        .lstep-dot.done { background: var(--green); transform: scale(1.3); }
        .lstep-dot.current { background: var(--gold); transform: scale(1.6); box-shadow: 0 0 4px var(--gold); }
        .lstep-dot.wrong { background: var(--red); }
        .lesson-scene { flex: 1; padding: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 230px; overflow-y: auto; color: white; }
        .lesson-question { font-size: 16px; font-weight: 700; margin-bottom: 12px; line-height: 1.5; }
        .lesson-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .lesson-option { padding: 14px 12px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; font-family: inherit; text-align: center; }
        .lesson-option:hover { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }
        .lesson-option:active { transform: scale(0.95); }
        .lesson-option.correct-pick { border-color: var(--green); background: rgba(16,185,129,0.25); animation: correct-burst 0.5s ease; }
        @keyframes correct-burst { 0%{transform:scale(1)} 30%{transform:scale(1.08)} 60%{transform:scale(0.96)} 100%{transform:scale(1)} }
        .lesson-option.wrong-pick { border-color: var(--red); background: rgba(239,68,68,0.2); animation: shake 0.5s ease; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
        
        .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .pair-left, .pair-right { display: flex; flex-direction: column; gap: 8px; }
        .pair-item { padding: 12px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: white; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; font-family: inherit; text-align: center; }
        .pair-item.selected { border-color: var(--gold); background: rgba(251,191,36,0.25); box-shadow: 0 0 10px rgba(251,191,36,0.3); }
        .pair-item.matched { border-color: var(--green); background: rgba(16,185,129,0.2); opacity: 0.6; pointer-events: none; }
        .pair-item.wrong-flash { border-color: var(--red); background: rgba(239,68,68,0.25); animation: shake 0.5s ease; }
        
        .lesson-input-row { display: flex; gap: 8px; width: 100%; }
        .lesson-input { flex: 1; padding: 14px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.08); color: white; font-size: 18px; text-align: center; font-weight: 700; outline: none; font-family: inherit; transition: all 0.2s ease; }
        .lesson-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(251,191,36,0.2); }
        .btn-lesson-submit { padding: 14px 22px; background: var(--gold); color: #0F172A; border: none; border-radius: 14px; font-weight: 800; font-size: 15px; cursor: pointer; font-family: inherit; transition: all 0.2s ease; box-shadow: 0 4px 0 #D97706; }
        .btn-lesson-submit:active { transform: translateY(2px); box-shadow: 0 2px 0 #D97706; }
        
        .lesson-explanation { display: none; margin-top: 10px; padding: 10px 14px; background: rgba(255,255,255,0.06); border-radius: 12px; font-size: 12px; line-height: 1.6; text-align: left; border-left: 3px solid var(--gold); animation: fadeIn 0.4s ease; width: 100%; }
        .lesson-explanation.show { display: block; }
        .lesson-explanation.good { border-left-color: var(--green); background: rgba(16,185,129,0.1); }
        .lesson-explanation.bad { border-left-color: var(--red); background: rgba(239,68,68,0.1); }
        @keyframes fadeIn { 0%{opacity:0;transform:translateY(-5px)} 100%{opacity:1;transform:translateY(0)} }
        
        .lesson-next { width: 100%; padding: 14px; color: white; border: none; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; display: none; align-items: center; justify-content: center; gap: 6px; transition: all 0.2s ease; letter-spacing: 0.5px; }
        .lesson-next.math-next { background: var(--math-primary); }
        .lesson-next.rus-next { background: var(--rus-primary); }
        .lesson-next.show { display: flex; }
        .lesson-next:active { filter: brightness(0.9); }
        
        .lesson-finish { display: none; flex-direction: column; align-items: center; padding: 24px; text-align: center; color: white; }
        .lesson-finish.show { display: flex; animation: popIn 0.4s ease; }
        .finish-emoji { font-size: 64px; margin-bottom: 8px; animation: bounce-emoji 0.6s ease; }
        @keyframes bounce-emoji { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 100%{transform:scale(1)} }
        .finish-stats { display: flex; gap: 20px; margin: 12px 0 16px; }
        .finish-stat { text-align: center; }
        .finish-stat-val { font-size: 20px; font-weight: 800; }
        .finish-stat-label { font-size: 10px; opacity: 0.7; }
        .btn-lesson-finish { padding: 12px 36px; border: none; border-radius: 16px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: inherit; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.2); transition: all 0.2s ease; }
        .btn-lesson-finish.math-finish { background: var(--math-primary); }
        .btn-lesson-finish.rus-finish { background: var(--rus-primary); }
        .btn-lesson-finish:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        
        .boss-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
        .boss-label { font-size: 14px; white-space: nowrap; color: white; font-weight: 600; }
        .boss-input { width: 80px; padding: 10px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: white; font-size: 16px; text-align: center; font-weight: 700; outline: none; font-family: inherit; transition: all 0.2s ease; }
        .boss-input:focus { border-color: var(--gold); }

        /* Истории, ловушки, профиль */
        .story-card { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 14px; cursor: pointer; margin-bottom: 8px; background: white; border: 2px solid #F1F5F9; box-shadow: var(--shadow-sm); transition: all 0.2s ease; }
        .story-card:active { transform: scale(0.97); }
        .story-card-icon { font-size: 36px; }
        .story-card-name { font-size: 14px; font-weight: 700; }
        .story-card-desc { font-size: 11px; color: var(--text-light); }
        .badge-new { background: var(--gold-light); color: #92400E; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .badge-done { background: var(--green-light); color: #065F46; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 700; }
        .trap-item { display: flex; align-items: center; gap: 12px; padding: 14px; border-radius: 14px; margin-bottom: 8px; cursor: pointer; background: white; border: 2px solid #F1F5F9; box-shadow: var(--shadow-sm); }
        .trap-item.danger { border-color: var(--red-light); background: #FFF5F5; }
        .trap-item.warning { border-color: var(--gold-light); background: #FFFBEB; }
        .trap-item.defused { opacity: 0.5; background: #F8FAFC; }
        .profile-header { text-align: center; padding: 18px; border-radius: 18px; margin-bottom: 16px; }
        .profile-header.math-prof { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); }
        .profile-header.rus-prof { background: linear-gradient(135deg, #F5F3FF, #EDE9FE); }
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .ach-item { text-align: center; padding: 12px 4px; border-radius: 14px; background: #F8FAFC; transition: all 0.3s ease; }
        .ach-item.unlocked { background: #FFFBEB; box-shadow: 0 2px 12px rgba(251,191,36,0.15); animation: unlock-pop 0.5s ease; }
        @keyframes unlock-pop { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header math-header" id="headerBar"><div class="header-top"><div class="header-left"><div class="cat-avatar" id="catAvatar">🐱</div><div class="header-app-name">Кот Учёный</div></div><div class="header-stats"><div class="stat"><span>🔥</span><span id="streakCount">7</span></div><div class="stat"><span>💎</span><span id="gemCount">245</span></div></div></div><div class="subject-switch"><button class="subject-btn active" id="btnMath"><span>🧮</span>Математика</button><button class="subject-btn" id="btnRus"><span>📝</span>Русский</button></div></div>
        <div class="cat-stage math-stage" id="catStage"><div class="cat-speech-bubble" id="catSpeech">Мур! Всё работает!</div><div class="cat-emoji" id="catBody">🐱</div></div>
        <div class="main-content"><div class="section-title"><span>🌳</span>Дерево навыков</div><div id="skillTree"></div></div>
        <div class="bottom-nav"><button class="nav-btn active" id="navHome"><span class="nav-icon">🏠</span>Главная</button><button class="nav-btn" id="navStories"><span class="nav-icon">📖</span>Истории</button><button class="nav-btn" id="navTraps" style="position:relative;"><span class="nav-icon">🪤</span>Ловушки<span class="nav-badge" id="trapsBadge" style="display:none;">0</span></button><button class="nav-btn" id="navProfile"><span class="nav-icon">👤</span>Профиль</button></div>
    </div>
    <div class="toast" id="toast"></div>
    <div class="achievement-toast" id="achToast"><span style="font-size:24px;">🏆</span><span id="achToastText"></span></div>
    <div class="lesson-overlay" id="lessonOverlay"><div class="lesson-container math-lesson" id="lessonContainer"><div class="lesson-header math-bar" id="lessonHeader"><span class="lesson-title" id="lessonTitle">📚</span><div style="display:flex;align-items:center;gap:6px;"><div class="lesson-steps" id="lessonSteps"></div><button class="lesson-close" id="lessonCloseBtn">✕</button></div></div><div class="lesson-scene" id="lessonScene"></div><button class="lesson-next math-next" id="lessonNextBtn">Далее ▸</button><div class="lesson-finish" id="lessonFinishBlock"><div class="finish-emoji">🎉</div><div class="finish-title" id="lfinishTitle">Урок пройден!</div><div class="finish-xp" id="lfinishXP"></div><div class="finish-subtitle" id="lfinishSubtitle"></div><div class="finish-stats"><div class="finish-stat"><div class="finish-stat-val" style="color:var(--green);" id="lfinishCorrect">0</div><div class="finish-stat-label">Верно</div></div><div class="finish-stat"><div class="finish-stat-val" style="color:var(--red);" id="lfinishWrong">0</div><div class="finish-stat-label">Ошибок</div></div></div><button class="btn-lesson-finish math-finish" id="btnLessonFinish">Завершить</button></div></div></div>
    <div class="story-overlay" id="storyOverlay"><div class="story-container math-story" id="storyContainer"><div class="story-header-bar math-bar" id="storyHeaderBar"><span class="story-title-header" id="storyTitleHeader">🕵️</span><div style="display:flex;align-items:center;gap:6px;"><div class="story-steps" id="storySteps"></div><button class="story-close-btn" id="storyCloseBtn">✕</button></div></div><div class="story-scene" id="storyScene"></div><button class="story-next-btn math-next" id="storyNextBtn">Далее ▸</button><div class="story-finish" id="storyFinishBlock2"><div class="finish-emoji">🏆</div><div class="finish-title" id="finishTitle"></div><div class="finish-xp" id="finishXP"></div><div class="finish-subtitle" id="finishSubtitle"></div><button class="btn-finish-story math-finish" id="btnFinishStory">Завершить</button></div></div></div>
    <div class="panel-overlay" id="storyPanel"><div class="panel-card"><div class="panel-title">📖 Истории</div><div class="panel-subtitle" id="storyPanelSubtitle"></div><div id="storyList"></div><button class="panel-close" id="btnStoryPanelClose">Закрыть</button></div></div>
    <div class="panel-overlay" id="trapsPanel"><div class="panel-card"><div class="panel-title">🪤 Ловушки</div><div class="panel-subtitle" id="trapsSubtitle"></div><div id="trapsList"></div><button class="panel-close" id="btnTrapsPanelClose">Закрыть</button></div></div>
    <div class="panel-overlay" id="profilePanel"><div class="panel-card"><div id="profileContent"></div><button class="panel-close" id="btnProfilePanelClose">Закрыть</button></div></div>
    <div class="trap-quiz-overlay" id="trapQuizOverlay"><div class="trap-quiz-card" id="trapQuizCard"></div></div>

    <script>
        (function() {
            const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,shuffle=a=>[...a].sort(()=>Math.random()-0.5);
            const state={
                subject:'math',streak:7,gems:245,currentStory:null,storyStep:0,storyAnswered:false,
                storiesCompleted:{math:false,rus1:false,rus2:false},
                traps:[],totalPets:0,currentLesson:null,lessonStep:0,lessonTasks:[],lessonCorrect:0,lessonWrong:0,lessonSkillId:null,
                lastWrongTask:null,_bonusAdded:false,_wrongTasks:[],_bonusCorrect:0,
                achievements:{
                    detective:{id:'detective',name:'🕵️ Детектив',desc:'Пройти 1 историю',unlocked:!1},
                    sherlock:{id:'sherlock',name:'🔍 Шерлок',desc:'Пройти 2 истории',unlocked:!1},
                    holmes:{id:'holmes',name:'🎩 Холмс',desc:'Пройти 3 истории',unlocked:!1},
                    saper:{id:'saper',name:'🪤 Сапёр',desc:'Обезвредить ловушку',unlocked:!1},
                    hunter:{id:'hunter',name:'💣 Охотник',desc:'Обезвредить 3',unlocked:!1},
                    murmur:{id:'murmur',name:'🐱 Мур-мур',desc:'Погладить 10 раз',unlocked:!1},
                    erudite:{id:'erudite',name:'📚 Эрудит',desc:'Переключить 5 раз',unlocked:!1},
                    firstBlood:{id:'firstBlood',name:'💎 Первая кровь',desc:'Ошибка → ловушки',unlocked:!1},
                    student:{id:'student',name:'🎓 Ученик',desc:'Пройти 1 урок',unlocked:!1},
                    master:{id:'master',name:'🏅 Мастер',desc:'Урок без ошибок',unlocked:!1},
                },
                skills:{
                    math:[
                        {id:'add',name:'Сложение',icon:'➕',color:'#3B82F6',progress:0,status:'current'},
                        {id:'sub',name:'Вычитание',icon:'➖',color:'#EF4444',progress:0,status:'locked'},
                        {id:'mul',name:'Умножение',icon:'✖️',color:'#F59E0B',progress:0,status:'locked'},
                        {id:'div',name:'Деление',icon:'➗',color:'#8B5CF6',progress:0,status:'locked'},
                        {id:'eq',name:'Уравнения',icon:'🔎',color:'#EC4899',progress:0,status:'locked'},
                        {id:'geom',name:'Периметр и площадь',icon:'📏',color:'#14B8A6',progress:0,status:'locked'},
                        {id:'frac',name:'Дроби',icon:'🍕',color:'#F97316',progress:0,status:'locked'},
                    ],
                    russian:[
                        {id:'zhishi',name:'ЖИ/ШИ, ЧА/ЩА, ЧУ/ЩУ',icon:'✍️',color:'#7C3AED',progress:0,status:'current'},
                        {id:'soft',name:'Разделительный Ь и Ъ',icon:'🧩',color:'#8B5CF6',progress:0,status:'locked'},
                        {id:'vowel',name:'Безударные гласные',icon:'🔎',color:'#F59E0B',progress:0,status:'locked'},
                        {id:'silent',name:'Непроизносимые согласные',icon:'🗣️',color:'#EC4899',progress:0,status:'locked'},
                        {id:'tsya',name:'-ТСЯ/-ТЬСЯ',icon:'🔄',color:'#14B8A6',progress:0,status:'locked'},
                        {id:'prepri',name:'ПРЕ/ПРИ',icon:'🎯',color:'#F97316',progress:0,status:'locked'},
                        {id:'nn',name:'Н и НН',icon:'📋',color:'#EF4444',progress:0,status:'locked'},
                    ]
                }
            };

            // ═══════════════ СОХРАНЕНИЕ ═══════════════
            function saveState() {
                const data = {
                    skills: state.skills, gems: state.gems, streak: state.streak,
                    storiesCompleted: state.storiesCompleted, traps: state.traps,
                    achievements: state.achievements, totalPets: state.totalPets,
                    subject: state.subject
                };
                localStorage.setItem('kot_ucheniy_v14', JSON.stringify(data));
            }
            function loadState() {
                const saved = localStorage.getItem('kot_ucheniy_v14');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (data.skills) state.skills = data.skills;
                        if (data.gems !== undefined) state.gems = data.gems;
                        if (data.streak !== undefined) state.streak = data.streak;
                        if (data.storiesCompleted) state.storiesCompleted = data.storiesCompleted;
                        if (data.traps) state.traps = data.traps;
                        if (data.achievements) state.achievements = data.achievements;
                        if (data.totalPets !== undefined) state.totalPets = data.totalPets;
                        if (data.subject) state.subject = data.subject;
                    } catch (e) { console.log('Ошибка загрузки:', e); }
                }
            }

            function makeWrongs(c,n=3){const w=new Set();while(w.size<n){const x=c+rnd(-8,8);if(x!==c&&x>=0&&!w.has(x))w.add(x);}return[...w];}
            function choiceT(emoji,badge,bc,q,correct,expl){const o=shuffle([correct,...makeWrongs(correct)]);return{type:'choice',emoji,badge,badgeClass:bc,question:q,options:o,correctIdx:o.indexOf(correct),correctAns:correct,explanation:expl};}
            function inputT(emoji,badge,bc,q,correct,expl){return{type:'input',emoji,badge,badgeClass:bc,question:q,correctAns:correct,explanation:expl};}
            function pairT(emoji,badge,bc,q,pairs,expl){return{type:'pair',emoji,badge,badgeClass:bc,question:q,pairs,explanation:expl};}

            function generateLesson(skillId,subject){
                if(subject==='math'){
                    if(skillId==='add')return generateAddLesson();
                    if(skillId==='sub')return generateSubLesson();
                    if(skillId==='mul')return generateMulLesson();
                    if(skillId==='div')return generateDivLesson();
                    if(skillId==='eq')return generateEqLesson();
                    if(skillId==='geom')return generateGeomLesson();
                    if(skillId==='frac')return generateFracLesson();
                    return generateAddLesson();
                }
                if(skillId==='zhishi')return generateZhishiLesson();
                if(skillId==='soft')return generateSoftLesson();
                if(skillId==='vowel')return generateVowelLesson();
                if(skillId==='silent')return generateSilentLesson();
                if(skillId==='tsya')return generateTsyaLesson();
                if(skillId==='prepri')return generatePrepriLesson();
                if(skillId==='nn')return generateNNLesson();
                return generateZhishiLesson();
            }

            function generateAddLesson(){
                const t=[],g=()=>[rnd(2,20),rnd(2,20)],add=(a,b)=>a+b;
                t.push(choiceT('🔥','Разминка','badge-warmup',`${g()[0]} + ${g()[1]} = ?`,add(g()[0],g()[1]),`Складываем`));
                t.push(choiceT('🖼️','Визуальное','badge-visual',`Яблоки: ${g()[0]} + ${g()[1]}`,add(g()[0],g()[1]),`Складываем`));
                t.push(choiceT('🎯','Выбор','badge-choice',`${g()[0]} + ${g()[1]} = ?`,add(g()[0],g()[1]),`Складываем`));
                const pd=[],ua=new Set();while(pd.length<3){const[a,b]=[rnd(2,15),rnd(2,15)],ans=add(a,b);if(!ua.has(ans)){ua.add(ans);pd.push({left:`${a} + ${b}`,right:`${ans}`,answer:ans});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини:',pd,''));
                const tn=rnd(5,20);t.push(choiceT('⚠️','Ловушка','badge-trap',`${tn} + 0 = ?`,tn,'Число + 0 = число!'));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} + ${g()[1]} = ?`,add(g()[0],g()[1]),`Складываем`));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} + ${g()[1]} = ?`,add(g()[0],g()[1]),`Складываем`));
                const[c1,c2]=[rnd(10,50),rnd(10,50)];t.push(inputT('⭐','Босс','badge-boss',`У Маши ${c1} руб, у Пети ${c2} руб. Вместе?`,add(c1,c2),`${c1}+${c2}=${add(c1,c2)}`));
                return t;
            }
            function generateSubLesson(){
                const t=[],g=()=>{const a=rnd(10,40),b=rnd(1,a-1);return[a,b];},sub=(a,b)=>a-b;
                t.push(choiceT('🔥','Разминка','badge-warmup',`${g()[0]} - ${g()[1]} = ?`,sub(g()[0],g()[1]),`Вычитаем`));
                t.push(choiceT('🖼️','Визуальное','badge-visual',`Было ${g()[0]} 🍎, съели ${g()[1]}`,sub(g()[0],g()[1]),`Вычитаем`));
                t.push(choiceT('🎯','Выбор','badge-choice',`${g()[0]} - ${g()[1]} = ?`,sub(g()[0],g()[1]),`Вычитаем`));
                const pd=[],ua=new Set();while(pd.length<3){const[a,b]=[rnd(10,30),rnd(1,a-1)],ans=sub(a,b);if(!ua.has(ans)){ua.add(ans);pd.push({left:`${a} - ${b}`,right:`${ans}`,answer:ans});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини:',pd,''));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`${rnd(10,30)} - ${rnd(10,30)} = ?`,0,'Одинаковые числа — 0!'));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} - ${g()[1]} = ?`,sub(g()[0],g()[1]),`Вычитаем`));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} - ${g()[1]} = ?`,sub(g()[0],g()[1]),`Вычитаем`));
                const[tot,sp]=[rnd(30,80),rnd(5,tot-10)];t.push(inputT('⭐','Босс','badge-boss',`Было ${tot} руб, потратили ${sp} руб. Осталось?`,sub(tot,sp),`${tot}-${sp}=${sub(tot,sp)}`));
                return t;
            }
            function generateMulLesson(){
                const t=[],g=()=>[rnd(2,10),rnd(2,10)],mul=(a,b)=>a*b;
                t.push(choiceT('🔥','Разминка','badge-warmup',`${g()[0]} × ${g()[1]} = ?`,mul(g()[0],g()[1]),`Умножаем`));
                t.push(choiceT('🖼️','Визуальное','badge-visual',`${g()[0]} группы по ${g()[1]} 🍎`,mul(g()[0],g()[1]),`Умножаем`));
                t.push(choiceT('🎯','Выбор','badge-choice',`${g()[0]} × ${g()[1]} = ?`,mul(g()[0],g()[1]),`Умножаем`));
                const pd=[],ua=new Set();while(pd.length<3){const[a,b]=[rnd(2,9),rnd(2,9)],ans=mul(a,b);if(!ua.has(ans)){ua.add(ans);pd.push({left:`${a} × ${b}`,right:`${ans}`,answer:ans});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини:',pd,''));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`${rnd(2,9)} × 0 = ?`,0,'Любое × 0 = 0!'));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} × ${g()[1]} = ?`,mul(g()[0],g()[1]),`Умножаем`));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} × ${g()[1]} = ?`,mul(g()[0],g()[1]),`Умножаем`));
                const[sh,bs]=[rnd(2,5),rnd(4,10)];t.push(inputT('⭐','Босс','badge-boss',`${sh} полки по ${bs} книг. Всего?`,mul(sh,bs),`${sh}×${bs}=${mul(sh,bs)}`));
                return t;
            }
            function generateDivLesson(){
                const t=[],g=()=>{const b=rnd(2,9),c=rnd(2,9);return[b*c,b];},div=(a,b)=>a/b;
                t.push(choiceT('🔥','Разминка','badge-warmup',`${g()[0]} ÷ ${g()[1]} = ?`,div(g()[0],g()[1]),`Делим`));
                t.push(choiceT('🖼️','Визуальное','badge-visual',`${g()[0]} 🍎 на ${g()[1]} корзины`,div(g()[0],g()[1]),`Делим`));
                t.push(choiceT('🎯','Выбор','badge-choice',`${g()[0]} ÷ ${g()[1]} = ?`,div(g()[0],g()[1]),`Делим`));
                const pd=[],ua=new Set();while(pd.length<3){const b=rnd(2,8),c=rnd(2,8),a=b*c,ans=c;if(!ua.has(ans)){ua.add(ans);pd.push({left:`${a} ÷ ${b}`,right:`${ans}`,answer:ans});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини:',pd,''));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`0 ÷ ${rnd(2,9)} = ?`,0,'0 ÷ число = 0!'));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} ÷ ${g()[1]} = ?`,div(g()[0],g()[1]),`Делим`));
                t.push(inputT('✏️','Ввод','badge-input',`${g()[0]} ÷ ${g()[1]} = ?`,div(g()[0],g()[1]),`Делим`));
                const[tot,fr]=[rnd(20,60),rnd(2,6)],ans=Math.floor(tot/fr),rem=tot-ans*fr;
                t.push(inputT('⭐','Босс','badge-boss',`${tot} конфет на ${fr} друзей. По сколько? (ост.${rem})`,ans,`${tot}÷${fr}=${ans}`));
                return t;
            }
            function generateEqLesson(){
                const t=[],g=()=>{const x=rnd(2,15),a=rnd(1,10);return[x,a,x+a];};
                t.push(choiceT('🔥','Разминка','badge-warmup',`x + ${g()[1]} = ${g()[2]}. x = ?`,g()[0],`x = ${g()[2]} - ${g()[1]}`));
                t.push(choiceT('🎯','Выбор','badge-choice',`x - 5 = 3. x = ?`,8,`x = 3 + 5`));
                t.push(choiceT('🎯','Выбор','badge-choice',`3 × x = 15. x = ?`,5,`x = 15 ÷ 3`));
                const pd=[],ua=new Set();while(pd.length<3){const x=rnd(2,12),a=rnd(1,8);if(!ua.has(x)){ua.add(x);pd.push({left:`x + ${a} = ${x+a}`,right:`x = ${x}`,answer:x});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини:',pd,''));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`x + 0 = 7. x = ?`,7,'x + 0 = x!'));
                t.push(inputT('✏️','Ввод','badge-input',`x + 3 = 10. x = ?`,7,`x = 10 - 3`));
                t.push(inputT('✏️','Ввод','badge-input',`4 × x = 20. x = ?`,5,`x = 20 ÷ 4`));
                t.push(inputT('⭐','Босс','badge-boss',`В 3 коробках 18 яблок. В одной?`,6,`18 ÷ 3 = 6`));
                return t;
            }
            function generateGeomLesson(){
                const t=[],rect=()=>[rnd(2,8),rnd(3,10)],sq=()=>rnd(2,8);
                t.push(choiceT('🔥','Разминка','badge-warmup',`Прямоугольник ${rect()[0]}×${rect()[1]}. P?`,2*(rect()[0]+rect()[1]),`P=2(a+b)`));
                t.push(choiceT('🖼️','Визуальное','badge-visual',`Квадрат со стороной ${sq()}. S?`,sq()*sq(),`S=a²`));
                t.push(inputT('✏️','Ввод','badge-input',`Прямоугольник ${rect()[0]}×${rect()[1]}. P?`,2*(rect()[0]+rect()[1]),`P=2(a+b)`));
                t.push(inputT('✏️','Ввод','badge-input',`Квадрат ${sq()}. S?`,sq()*sq(),`S=a²`));
                t.push(choiceT('🎯','Выбор','badge-choice',`Прямоугольник ${rect()[0]}×${rect()[1]}. S?`,rect()[0]*rect()[1],`S=a×b`));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`Квадрат ${sq()}. P?`,4*sq(),`P=4a, не a²!`));
                t.push(inputT('✏️','Ввод','badge-input',`Прямоугольник ${rect()[0]}×${rect()[1]}. S?`,rect()[0]*rect()[1],`S=a×b`));
                const[rw,rh]=[rnd(4,10),rnd(3,8)];t.push(inputT('⭐','Босс','badge-boss',`Комната ${rw}×${rh} м. P и S (через запятую)`,`${2*(rw+rh)},${rw*rh}`,`P=${2*(rw+rh)}, S=${rw*rh}`));
                return t;
            }
            function generateFracLesson(){
                const t=[];
                t.push(choiceT('🔥','Разминка','badge-warmup',`Какая дробь больше: 1/3 или 2/3?`,'2/3','Больше числитель → больше дробь'));
                t.push(choiceT('🎯','Выбор','badge-choice',`1/2 от 10?`,5,'10÷2=5'));
                t.push(choiceT('🎯','Выбор','badge-choice',`Сократи: 2/4`,'1/2','Делим на 2'));
                t.push(inputT('✏️','Ввод','badge-input',`Сократи: 3/9 (как 1/3)`,'1/3','Делим на 3'));
                t.push(choiceT('🖼️','Визуальное','badge-visual',`Пицца на 8 частей, съели 3. Осталось?`,'5/8','8-3=5 → 5/8'));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`1/2 + 1/2 = ?`,'1','2/2 = 1! Не 2/4!'));
                t.push(inputT('✏️','Ввод','badge-input',`1/3 от 12?`,4,'12÷3=4'));
                t.push(inputT('⭐','Босс','badge-boss',`Торт на 6 частей, 2 съели. Осталось? (как 4/6)`,`4/6`,`6-2=4 → 4/6`));
                return t;
            }

            function generateZhishiLesson(){
                const d=[{q:'ж_раф',a:'и',hint:'ЖИ с И',wrong:'ы'},{q:'ш_шка',a:'и',hint:'ШИ с И',wrong:'ы'},{q:'маш_на',a:'и',hint:'ШИ с И',wrong:'ы'},{q:'ч_шка',a:'а',hint:'ЧА с А',wrong:'я'},{q:'щ_вель',a:'а',hint:'ЩА с А',wrong:'я'},{q:'ч_до',a:'у',hint:'ЧУ с У',wrong:'ю'},{q:'щ_ка',a:'у',hint:'ЩУ с У',wrong:'ю'}];
                const sel=shuffle(d).slice(0,8),tasks=[];
                sel.forEach((d,i)=>{
                    const opts=shuffle([d.a,d.wrong]),ci=opts.indexOf(d.a);
                    if(i<4)tasks.push({type:'choice',emoji:'📝',badge:'Выбор',badgeClass:'badge-choice',question:`Вставь: «${d.q}»`,options:opts,correctIdx:ci,correctAns:d.a,explanation:d.hint});
                    else if(i<6)tasks.push({type:'input',emoji:'✏️',badge:'Ввод',badgeClass:'badge-input',question:`Впиши: «${d.q}»`,correctAns:d.a,explanation:d.hint});
                    else if(i===6)tasks.push({type:'choice',emoji:'⚠️',badge:'Ловушка',badgeClass:'badge-trap',question:'«ж_раф» — и или ы?',options:['и','ы'],correctIdx:0,correctAns:'и',explanation:'ЖИ с И!'});
                    else tasks.push({type:'boss_zhishi',emoji:'⭐',badge:'Босс',badgeClass:'badge-boss',question:'Вставь:',words:[{text:'ж_знь',answer:'и'},{text:'ч_до',answer:'у'},{text:'рощ_',answer:'а'}],explanation:'ЖИ, ЧУ, ЩА'});
                });
                return tasks;

            // ═══════════════ НОВЫЙ РЕНДЕР НАВЫКОВ ═══════════════
            function renderSkillTree(){

                $('#skillTree').innerHTML='<div class="skill-path">'+skills.map(s=>{

                    const se=s.status==='completed'?'✅':s.status==='current'?'▶️':'🔒';

                    if(s.status==='locked'&&hasActiveTraps){

                $$('#skillTree .skill-card').forEach(card=>{

                        }else if(st==='locked'){
                            showToast('🔒','Пройди предыдущий навык!');

                            showToast('✅','Уже пройден!');

                            startLesson(id);
                        }

                });
            }

            function getAvail(){const n=new Date();return state.traps.filter(t=>t.defuses<4&&new Date(t.nextDate)<=n&&t.subject===state.subject);}
            function getLocked(){const n=new Date();return state.traps.filter(t=>t.defuses<4&&new Date(t.nextDate)>n&&t.subject===state.subject);}
            function getDefused(){return state.traps.filter(t=>t.defuses>=4&&t.subject===state.subject);}
            function getInt(d){return[1,3,7,14][d]||14;}
            function updateTrapsBadge(){const a=getAvail().length;if(a>0){$('#trapsBadge').style.display='flex';$('#trapsBadge').textContent=a;}else{$('#trapsBadge').style.display='none';}}
            function renderTrapsPanel(){const av=getAvail(),lo=getLocked(),de=getDefused();let h='';if(!av.length&&!lo.length&&!de.length)h='<div style="text-align:center;padding:20px;">🏆<br>Пусто!</div>';else{if(av.length){h+='<p style="font-weight:700;color:var(--red);margin-bottom:6px;">🔴 Ожидают</p>';av.forEach(t=>{h+=`<div class="trap-item danger" data-id="${t.id}"><div class="trap-icon">🪤</div><div class="trap-info"><div class="trap-name">${t.question}</div><div class="trap-source">${t.source} | ${t.defuses}/4</div></div><span class="trap-status status-danger">Ждёт!</span></div>`;});}if(lo.length){h+='<p style="font-weight:700;color:var(--orange);margin:10px 0 6px;">🟡 Пауза</p>';lo.forEach(t=>{const hrs=Math.ceil((new Date(t.nextDate)-new Date())/3600000);h+=`<div class="trap-item warning"><div class="trap-icon">⏳</div><div class="trap-info"><div class="trap-name">${t.question}</div><div class="trap-source">Через ~${hrs}ч | ${t.defuses}/4</div></div><span class="trap-status status-warning">Пауза</span></div>`;});}if(de.length){h+='<p style="font-weight:700;color:var(--green);margin:10px 0 6px;">🟢 Обезврежены</p>';de.forEach(t=>{h+=`<div class="trap-item defused"><div class="trap-icon">✅</div><div class="trap-info"><div class="trap-name">${t.question}</div><div class="trap-source">${t.source}</div></div><span class="trap-status status-defused">Готово</span></div>`;});}}$('#trapsList').innerHTML=h;$('#trapsSubtitle').textContent=av.length?`${av.length} ловушка(и) ждёт!`:'';$$('#trapsList .trap-item.danger').forEach(el=>{el.addEventListener('click',()=>{const t=state.traps.find(x=>x.id===el.dataset.id);if(t)openTrapQuiz(t);});});}

            // ═══════════════ ЛОВУШКИ ОТКРЫВАЮТ НАВЫКИ ═══════════════
            function openTrapQuiz(trap){
                let h=`<div class="trap-quiz-emoji">🪤</div><div class="trap-quiz-title">Обезвреживание ${trap.defuses+1}/4</div><div class="trap-quiz-text">${trap.question}</div>`;
                if(trap.isInput)h+=`<div class="task-input-row"><input type="text" class="task-input" id="tqInp" placeholder="Ответ" autocomplete="off"><button class="btn-submit" id="tqSub">✓</button></div>`;
                else h+=`<div class="trap-quiz-options" id="tqOpts">${trap.options.map((o,i)=>`<button class="trap-quiz-option" data-idx="${i}">${o}</button>`).join('')}</div>`;
                h+=`<div class="trap-quiz-explanation" id="tqExpl"></div><button class="btn-trap-quiz-close" id="tqClose">Закрыть</button>`;
                $('#trapQuizCard').innerHTML=h;$('#trapQuizOverlay').classList.add('active');
                const expl=$('#tqExpl');let done=!1;
                
                const success=()=>{
                    trap.defuses++;
                    trap.nextDate=new Date(Date.now()+getInt(trap.defuses)*86400000).toISOString();
                    state.gems+=5+trap.defuses*3;
                    updateStats();
                    
                    // 🔓 Открываем навык только когда ВСЕ ловушки по предмету обезврежены хотя бы раз
                    if (trap.defuses === 1) {
                        const subjectTraps = state.traps.filter(t => t.subject === trap.subject && t.defuses >= 1);
                        const allSubjectTraps = state.traps.filter(t => t.subject === trap.subject);
                        const allDefusedAtLeastOnce = allSubjectTraps.length > 0 && allSubjectTraps.every(t => t.defuses >= 1);
                        
                        if (allDefusedAtLeastOnce) {
                            const skills = state.skills[trap.subject];
                            if (skills) {
                                const currentSkill = skills.find(s => s.status === 'current');
                                if (currentSkill && currentSkill.progress < 100) {
                                    currentSkill.progress = 100;
                                    currentSkill.status = 'completed';
                                    unlockNextForSubject(trap.subject);
                                    showToast('🔓', 'Все ловушки обезврежены! Навык открыт!');
                                }
                            }
                        } else {
                            const remaining = allSubjectTraps.filter(t => t.defuses === 0).length;
                            if (remaining > 0) {
                                showToast('🪤', `Осталось обезвредить: ${remaining}`);
                            }
                        }
                    }
                    
                    showToast(trap.defuses>=4?'🏆':'✅',trap.defuses>=4?'Готово!':`+${5+trap.defuses*3} 💎`);
                    checkAchs();
                    updateTrapsBadge();
                    renderTrapsPanel();
                    renderSkillTree();
                    saveState();
                    setTimeout(()=>$('#trapQuizOverlay').classList.remove('active'),600);
                };
                
                if(trap.isInput){
                    const inp=$('#tqInp'),btn=$('#tqSub');
                    const sub=()=>{
                        if(done)return;done=!0;btn.disabled=!0;inp.disabled=!0;
                        if(inp.value.trim().toLowerCase()===String(trap.answer).toLowerCase()){
                            inp.style.borderColor='var(--green)';inp.style.background='rgba(16,185,129,0.2)';
                            if(expl){expl.textContent='✅ '+trap.explanation;expl.className='trap-quiz-explanation show good';}

                        }else{

                            if(expl){expl.textContent='🤔 '+trap.explanation;expl.className='trap-quiz-explanation show bad';}
                        }
                    };
                    btn.addEventListener('click',sub);
                    inp.addEventListener('keydown',e=>{if(e.key==='Enter')sub();});
                }else{

                            success();
                        }else{
                            o.classList.add('wrong-pick');
                            opts[trap.correct].classList.add('correct-pick');
                            if(expl){expl.textContent='🤔 '+trap.explanation;expl.className='trap-quiz-explanation show bad';}
                        }
                    }));
                }
                $('#tqClose').addEventListener('click',()=>{$('#trapQuizOverlay').classList.remove('active');updateTrapsBadge();renderTrapsPanel();});
            }

            function openStoryPanel(){const im=state.subject==='math';$('#storyPanelSubtitle').textContent=im?'Математические расследования':'Расследования по русскому';const list=storyList[state.subject];$('#storyList').innerHTML=list.map(s=>{const done=state.storiesCompleted[s.id];return`<div class="story-card" data-story="${s.id}"><div class="story-card-icon">${im?'🧮':'📝'}</div><div class="story-card-info"><div class="story-card-name">${s.title}</div><div class="story-card-desc">${s.scenes.filter(x=>x.type!=='dialogue').length} задания</div></div><span class="story-card-badge ${done?'badge-done':'badge-new'}">${done?'✅':'🔄'}</span></div>`;}).join('');$$('#storyList .story-card').forEach(c=>c.addEventListener('click',()=>startStory(c.dataset.story)));$('#storyPanel').classList.add('active');}
            function startStory(id){const scr=storySrc[Object.keys(storySrc).find(k=>storySrc[k].id===id)];state.currentStory=id;state.storyStep=0;state.storyAnswered=!1;const im=scr.subj==='math';$('#storyContainer').className='story-container '+(im?'math-story':'rus-story');$('#storyHeaderBar').className='story-header-bar '+(im?'math-bar':'rus-bar');$('#storyTitleHeader').textContent=scr.title;$('#storySteps').innerHTML=Array.from({length:scr.scenes.length},(_,i)=>`<span class="step-dot ${i===0?'current':''}"></span>`).join('');$('#storyNextBtn').className='story-next-btn '+(im?'math-next':'rus-next');$('#btnFinishStory').className='btn-finish-story '+(im?'math-finish':'rus-finish');$('#storyOverlay').classList.add('active');$('#storyNextBtn').classList.remove('show');$('#storyFinishBlock2').classList.remove('show');$('#storyScene').style.display='flex';$('#storyPanel').classList.remove('active');renderStoryStep();}

            function nextStoryStep(){const scr=storySrc[Object.keys(storySrc).find(k=>storySrc[k].id===state.currentStory)];state.storyStep++;if(state.storyStep>=scr.scenes.length)finishStory();else{renderStoryStep();$('#storyScene').scrollTop=0;}}
            function finishStory(){$('#storyScene').style.display='none';$('#storyNextBtn').classList.remove('show');$('#storyFinishBlock2').classList.add('show');state.storiesCompleted[state.currentStory]=!0;const scr=storySrc[Object.keys(storySrc).find(k=>storySrc[k].id===state.currentStory)];const im=scr.subj==='math';$('#finishTitle').textContent=im?'Дело раскрыто!':'Язык спасён!';$('#finishXP').textContent=im?'+40 💎':'+50 💎';$('#finishSubtitle').textContent=im?'Торт найден!':'Ты герой! 📚';state.gems+=im?40:50;updateStats();$$('#storySteps .step-dot').forEach(d=>{d.classList.add('done');d.classList.remove('current');});catSpeech.textContent='Мур! Дело раскрыто! 🏆';checkAchs();updateTrapsBadge();saveState();}
            function renderProfile(){const im=state.subject==='math';const done=(state.storiesCompleted.math?1:0)+(state.storiesCompleted.rus1?1:0)+(state.storiesCompleted.rus2?1:0);const def=state.traps.reduce((s,t)=>s+t.defuses,0);const unl=Object.values(state.achievements).filter(a=>a.unlocked).length;let h=`<div class="profile-header ${im?'math-prof':'rus-prof'}"><div class="profile-cat">${im?'🐱':'😺'}</div><div class="profile-name">Кот Учёный</div><div style="font-size:11px;color:var(--text-light);">${im?'Математик':'Филолог'}</div><div class="profile-stats"><div class="profile-stat"><div class="profile-stat-val ${im?'math-val':'rus-val'}">${done}</div><div class="profile-stat-label">Историй</div></div><div class="profile-stat"><div class="profile-stat-val ${im?'math-val':'rus-val'}">${def}</div><div class="profile-stat-label">Ловушек</div></div><div class="profile-stat"><div class="profile-stat-val ${im?'math-val':'rus-val'}">${unl}</div><div class="profile-stat-label">Ачивок</div></div></div></div>`;h+='<div style="font-weight:800;color:var(--text);margin-bottom:10px;">🏆 Достижения</div><div class="ach-grid">';Object.values(state.achievements).forEach(a=>{const cls=a.unlocked?'unlocked':'locked';h+=`<div class="ach-item ${cls}"><div class="ach-icon">${a.unlocked?a.name.split(' ')[0]:'🔒'}</div><div class="ach-name">${a.name.split(' ').slice(1).join(' ')}</div><div class="ach-desc">${a.desc}</div></div>`;});h+='</div>';$('#profileContent').innerHTML=h;}
            const catBody=$('#catBody'),catSpeech=$('#catSpeech');
            catBody.addEventListener('click',()=>{catBody.classList.add('petted');setTimeout(()=>catBody.classList.remove('petted'),600);state.totalPets++;checkAchs();const p=document.createElement('span');p.className='hearts-particle';p.textContent=['❤️','💕','✨','💖'][Math.floor(Math.random()*4)];p.style.left=(Math.random()*30-10)+'px';p.style.animationDuration=(Math.random()*0.6+0.8)+'s';catBody.appendChild(p);setTimeout(()=>p.remove(),1200);catSpeech.textContent=state.totalPets>=10?'Мур-мур! 💖':'Мррр!';saveState();});
            $('#btnMath').addEventListener('click',()=>{if(state.subject!=='math'){state.subject='math';updateSubjectUI();renderSkillTree();updateTrapsBadge();saveState();}});
            $('#btnRus').addEventListener('click',()=>{if(state.subject!=='russian'){state.subject='russian';updateSubjectUI();renderSkillTree();updateTrapsBadge();saveState();}});
            $('#navHome').addEventListener('click',()=>{$$('.nav-btn').forEach(b=>b.classList.remove('active'));$('#navHome').classList.add('active');});
            $('#navStories').addEventListener('click',()=>{$$('.nav-btn').forEach(b=>b.classList.remove('active'));$('#navStories').classList.add('active');openStoryPanel();});
            $('#navTraps').addEventListener('click',()=>{$$('.nav-btn').forEach(b=>b.classList.remove('active'));$('#navTraps').classList.add('active');renderTrapsPanel();$('#trapsPanel').classList.add('active');});
            $('#navProfile').addEventListener('click',()=>{$$('.nav-btn').forEach(b=>b.classList.remove('active'));$('#navProfile').classList.add('active');renderProfile();$('#profilePanel').classList.add('active');});
            $('#btnStoryPanelClose').addEventListener('click',()=>$('#storyPanel').classList.remove('active'));
            $('#btnTrapsPanelClose').addEventListener('click',()=>$('#trapsPanel').classList.remove('active'));
            $('#btnProfilePanelClose').addEventListener('click',()=>$('#profilePanel').classList.remove('active'));
            $('#trapQuizOverlay').addEventListener('click',e=>{if(e.target===$('#trapQuizOverlay')){$('#trapQuizOverlay').classList.remove('active');updateTrapsBadge();renderTrapsPanel();}});
            $('#lessonCloseBtn').addEventListener('click',closeLesson);$('#lessonNextBtn').addEventListener('click',nextLessonStep);$('#btnLessonFinish').addEventListener('click',closeLesson);
            $('#storyNextBtn').addEventListener('click',nextStoryStep);$('#storyCloseBtn').addEventListener('click',closeStory);$('#btnFinishStory').addEventListener('click',closeStory);
            
            loadState();
            updateSubjectUI();
            renderSkillTree();
            updateTrapsBadge();
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
            console.log('🐱 v14 FINAL — localStorage + Ловушки открывают навыки!');
        })();
    </script>
</body>
</html>
