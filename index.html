<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#3B82F6">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Кот Учёный — Полное дерево навыков</title>
    <style>
        :root {
            --math-primary: #3B82F6; --math-light: #EFF6FF; --math-gradient: linear-gradient(135deg, #3B82F6, #1D4ED8);
            --rus-primary: #7C3AED; --rus-light: #F5F3FF; --rus-gradient: linear-gradient(135deg, #7C3AED, #5B21B6);
            --green: #10B981; --red: #EF4444; --orange: #F59E0B; --gold: #FBBF24;
            --bg: #F8FAFC; --card: #FFFFFF; --text: #1E293B; --text-light: #94A3B8;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06); --shadow: 0 4px 16px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif; background: #E2E8F0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 12px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .app { width: 100%; max-width: 420px; background: var(--bg); border-radius: 24px; box-shadow: var(--shadow-lg); overflow: hidden; display: flex; flex-direction: column; height: 93vh; max-height: 860px; position: relative; }
        .header { padding: 12px 14px 8px; color: white; z-index: 10; transition: background 0.4s; }
        .header.math-header { background: var(--math-gradient); }
        .header.rus-header { background: var(--rus-gradient); }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .header-left { display: flex; align-items: center; gap: 8px; }
        .cat-avatar { width: 34px; height: 34px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); }
        .cat-avatar:active { transform: scale(0.9); }
        .header-app-name { font-size: 15px; font-weight: 800; }
        .header-stats { display: flex; gap: 10px; font-size: 11px; font-weight: 700; }
        .stat { display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.15); padding: 4px 8px; border-radius: 14px; }
        .subject-switch { display: flex; background: rgba(255,255,255,0.2); border-radius: 12px; padding: 3px; }
        .subject-btn { flex: 1; padding: 8px 8px; border: none; background: transparent; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.3s; color: rgba(255,255,255,0.8); font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .subject-btn.active { background: white; color: var(--text); box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .cat-stage { padding: 6px 16px 4px; display: flex; flex-direction: column; align-items: center; min-height: 75px; justify-content: flex-end; transition: background 0.4s; }
        .cat-stage.math-stage { background: linear-gradient(180deg, #DBEAFE 0%, #F8FAFC 100%); }
        .cat-stage.rus-stage { background: linear-gradient(180deg, #EDE9FE 0%, #F8FAFC 100%); }
        .cat-speech-bubble { background: white; padding: 6px 10px; border-radius: 12px 12px 12px 4px; box-shadow: var(--shadow-sm); font-size: 11px; font-weight: 600; color: var(--text); max-width: 200px; text-align: center; margin-bottom: 4px; animation: floatBubble 3s ease-in-out infinite; }
        @keyframes floatBubble { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
        .cat-emoji { font-size: 40px; cursor: pointer; transition: all 0.3s; line-height: 1; position: relative; }
        .cat-emoji:active { transform: scale(0.9); }
        .cat-emoji.petted { animation: purr 0.6s ease; }
        @keyframes purr { 0%{transform:translateX(0)} 25%{transform:translateX(-4px) rotate(-3deg)} 50%{transform:translateX(4px) rotate(3deg)} 75%{transform:translateX(-2px)} 100%{transform:translateX(0)} }
        .hearts-particle { position: absolute; font-size: 14px; pointer-events: none; animation: floatUp 1s ease forwards; opacity: 0; }
        @keyframes floatUp { 0%{transform:translateY(0) scale(1);opacity:1} 100%{transform:translateY(-40px) scale(1.5);opacity:0} }
        .main-content { flex: 1; overflow-y: auto; padding: 4px 12px 6px; }
        .main-content::-webkit-scrollbar { width: 0; }
        .section-title { font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
        .skill-path { position: relative; padding-left: 18px; }
        .skill-node { position: relative; margin-bottom: 3px; }
        .skill-node::before { content: ''; position: absolute; left: -13px; top: 0; width: 2px; height: 100%; background: #E2E8F0; border-radius: 2px; }
        .skill-node:first-child::before { top: 50%; height: 50%; }
        .skill-node:last-child::before { height: 50%; }
        .skill-node.completed::before { background: var(--green); }
        .skill-node::after { content: ''; position: absolute; left: -16px; top: 18px; width: 7px; height: 7px; border-radius: 50%; background: #E2E8F0; border: 2px solid #F8FAFC; z-index: 2; }
        .skill-node.completed::after { background: var(--green); }
        .skill-node.current::after { background: white; border: 2px solid var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,0.15); }
        .skill-card { background: white; border-radius: 10px; padding: 8px 10px; box-shadow: var(--shadow-sm); cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; border: 2px solid transparent; }
        .skill-card:active { transform: scale(0.97); }
        .skill-card.locked { opacity: 0.45; cursor: not-allowed; filter: grayscale(0.3); }
        .skill-card.current { border-color: var(--green); box-shadow: 0 0 0 2px rgba(16,185,129,0.08); }
        .skill-icon-box { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .skill-info { flex: 1; min-width: 0; }
        .skill-name { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 1px; }
        .skill-progress-text { font-size: 9px; color: var(--text-light); font-weight: 600; }
        .skill-progress-bar { height: 3px; background: #F1F5F9; border-radius: 3px; margin-top: 2px; overflow: hidden; }
        .skill-progress-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
        .skill-badge { font-size: 15px; flex-shrink: 0; }
        .bottom-nav { display: flex; background: white; padding: 5px 4px 8px; border-top: 1px solid #F1F5F9; gap: 1px; }
        .nav-btn { flex: 1; padding: 6px 1px; border: none; background: transparent; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 1px; font-family: inherit; color: #94A3B8; font-size: 9px; font-weight: 700; transition: all 0.2s; border-radius: 8px; position: relative; }
        .nav-btn.active { color: var(--math-primary); }
        .rus-mode .nav-btn.active { color: var(--rus-primary); }
        .nav-icon { font-size: 18px; transition: transform 0.2s; }
        .nav-btn:active .nav-icon { transform: scale(0.85); }
        .nav-badge { position: absolute; top: 0; right: 2px; background: var(--red); color: white; font-size: 8px; font-weight: 800; min-width: 14px; height: 14px; border-radius: 7px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
        .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-120px); background: #1E293B; color: white; padding: 8px 16px; border-radius: 20px; font-weight: 700; font-size: 12px; z-index: 600; transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 5px; box-shadow: 0 6px 20px rgba(0,0,0,0.3); pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .achievement-toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-140px); background: linear-gradient(135deg, #1E293B, #334155); color: var(--gold); padding: 10px 16px; border-radius: 16px; font-weight: 800; font-size: 13px; z-index: 700; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); pointer-events: none; border: 1px solid rgba(251,191,36,0.3); }
        .achievement-toast.show { transform: translateX(-50%) translateY(0); }
        .panel-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; backdrop-filter: blur(4px); }
        .panel-overlay.active { opacity: 1; pointer-events: all; }
        .panel-card { background: white; border-radius: 20px; padding: 20px 16px 16px; width: 90%; max-width: 360px; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }
        .panel-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 2px; text-align: center; }
        .panel-subtitle { font-size: 11px; color: var(--text-light); margin-bottom: 14px; text-align: center; }
        .panel-close { display: block; margin: 12px auto 0; padding: 10px 22px; background: #F1F5F9; border: none; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; color: var(--text); }
        .story-card { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 12px; cursor: pointer; transition: all 0.2s; margin-bottom: 6px; background: white; border: 2px solid #F1F5F9; box-shadow: var(--shadow-sm); }
        .story-card:active { transform: scale(0.96); }
        .story-card-icon { font-size: 34px; flex-shrink: 0; }
        .story-card-info { flex: 1; }
        .story-card-name { font-size: 13px; font-weight: 700; color: var(--text); }
        .story-card-desc { font-size: 10px; color: var(--text-light); }
        .badge-new { background: #FEF3C7; color: #B45309; padding: 3px 7px; border-radius: 7px; font-size: 9px; font-weight: 700; }
        .badge-done { background: #D1FAE5; color: #065F46; padding: 3px 7px; border-radius: 7px; font-size: 9px; font-weight: 700; }

        /* УРОК */
        .lesson-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .lesson-overlay.active { opacity: 1; pointer-events: all; }
        .lesson-container { width: 92%; max-width: 380px; max-height: 88vh; border-radius: 22px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .lesson-container.math-lesson { background: #0F172A; }
        .lesson-container.rus-lesson { background: #1E0A3C; }
        @keyframes slideUp { 0%{transform:translateY(40px);opacity:0} 100%{transform:translateY(0);opacity:1} }
        .lesson-header { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .lesson-header.math-bar { background: #1E293B; }
        .lesson-header.rus-bar { background: #2D1154; }
        .lesson-close { width: 26px; height: 26px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .lesson-title { font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .lesson-steps { display: flex; gap: 2px; }
        .lstep-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: all 0.3s; }
        .lstep-dot.done { background: var(--green); }
        .lstep-dot.current { background: var(--gold); transform: scale(1.5); }
        .lstep-dot.wrong { background: var(--red); }
        .lesson-scene { flex: 1; padding: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 220px; overflow-y: auto; color: white; }
        .lesson-emoji { font-size: 38px; margin-bottom: 4px; }
        .lesson-type-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 6px; border-radius: 5px; margin-bottom: 6px; }
        .badge-warmup { background: #3B82F620; color: #60A5FA; }
        .badge-visual { background: #10B98120; color: #34D399; }
        .badge-choice { background: #8B5CF620; color: #A78BFA; }
        .badge-pair { background: #F59E0B20; color: #FBBF24; }
        .badge-trap { background: #EF444420; color: #F87171; }
        .badge-input { background: #EC489920; color: #F472B6; }
        .badge-boss { background: #F59E0B30; color: #FCD34D; }
        .badge-bonus { background: #10B98120; color: #34D399; }
        .lesson-question { font-size: 14px; font-weight: 700; margin-bottom: 3px; line-height: 1.4; white-space: pre-line; }
        .lesson-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; width: 100%; }
        .lesson-option { padding: 11px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); color: white; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: center; }
        .lesson-option:active { transform: scale(0.95); }
        .lesson-option.correct-pick { border-color: var(--green); background: rgba(16,185,129,0.2); animation: pulse 0.6s ease; }
        .lesson-option.wrong-pick { border-color: var(--red); background: rgba(239,68,68,0.2); animation: shake 0.5s ease; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        .pair-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .pair-left, .pair-right { display: flex; flex-direction: column; gap: 6px; }
        .pair-item { padding: 10px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); color: white; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: center; }
        .pair-item.selected { border-color: var(--gold); background: rgba(251,191,36,0.2); }
        .pair-item.matched { border-color: var(--green); background: rgba(16,185,129,0.15); opacity: 0.7; pointer-events: none; }
        .pair-item.wrong-flash { border-color: var(--red); background: rgba(239,68,68,0.2); animation: shake 0.5s ease; }
        .lesson-input-row { display: flex; gap: 6px; width: 100%; }
        .lesson-input { flex: 1; padding: 11px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: white; font-size: 16px; text-align: center; font-weight: 700; outline: none; font-family: inherit; }
        .lesson-input:focus { border-color: var(--gold); }
        .btn-lesson-submit { padding: 11px 18px; background: var(--gold); color: #0F172A; border: none; border-radius: 10px; font-weight: 800; font-size: 14px; cursor: pointer; font-family: inherit; }
        .lesson-explanation { display: none; margin-top: 8px; padding: 8px 10px; background: rgba(255,255,255,0.08); border-radius: 8px; font-size: 11px; line-height: 1.5; text-align: left; border-left: 3px solid var(--gold); animation: fadeIn 0.4s ease; width: 100%; }
        .lesson-explanation.show { display: block; }
        .lesson-explanation.good { border-left-color: var(--green); background: rgba(16,185,129,0.1); }
        .lesson-explanation.bad { border-left-color: var(--red); background: rgba(239,68,68,0.1); }
        @keyframes fadeIn { 0%{opacity:0;transform:translateY(-4px)} 100%{opacity:1;transform:translateY(0)} }
        .lesson-next { width: 100%; padding: 10px; color: white; border: none; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; display: none; align-items: center; justify-content: center; gap: 3px; transition: all 0.2s; }
        .lesson-next.math-next { background: var(--math-primary); }
        .lesson-next.rus-next { background: var(--rus-primary); }
        .lesson-next.show { display: flex; }
        .lesson-finish { display: none; flex-direction: column; align-items: center; padding: 16px; text-align: center; color: white; }
        .lesson-finish.show { display: flex; }
        .finish-emoji { font-size: 56px; margin-bottom: 6px; }
        .finish-stats { display: flex; gap: 14px; margin: 8px 0 12px; }
        .finish-stat { text-align: center; }
        .finish-stat-val { font-size: 16px; font-weight: 800; }
        .finish-stat-label { font-size: 9px; opacity: 0.7; }
        .btn-lesson-finish { padding: 10px 26px; border: none; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; color: white; box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
        .btn-lesson-finish.math-finish { background: var(--math-primary); }
        .btn-lesson-finish.rus-finish { background: var(--rus-primary); }
        .btn-lesson-finish:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .boss-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; flex-wrap: wrap; justify-content: center; }
        .boss-label { font-size: 13px; white-space: nowrap; color: white; }
        .boss-input { width: 70px; padding: 9px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: white; font-size: 15px; text-align: center; font-weight: 700; outline: none; font-family: inherit; }
        .boss-input:focus { border-color: var(--gold); }

        /* ИСТОРИИ */
        .story-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 300; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .story-overlay.active { opacity: 1; pointer-events: all; }
        .story-container { width: 92%; max-width: 380px; max-height: 88vh; border-radius: 22px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: slideUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .story-container.math-story { background: #0F172A; }
        .story-container.rus-story { background: #1E0A3C; }
        .story-header-bar { padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .story-header-bar.math-bar { background: #1E293B; }
        .story-header-bar.rus-bar { background: #2D1154; }
        .story-close-btn { width: 26px; height: 26px; border-radius: 50%; border: none; background: rgba(255,255,255,0.15); color: white; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .story-title-header { font-weight: 800; font-size: 12px; display: flex; align-items: center; gap: 5px; }
        .story-steps { display: flex; gap: 2px; }
        .step-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: all 0.3s; }
        .step-dot.done { background: var(--green); }
        .step-dot.current { background: var(--gold); transform: scale(1.5); }
        .story-scene { flex: 1; padding: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; min-height: 220px; overflow-y: auto; color: white; }
        .scene-emoji { font-size: 50px; margin-bottom: 6px; animation: sceneBounce 2s ease infinite; }
        @keyframes sceneBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
        .scene-speaker { color: var(--gold); font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .scene-text { font-size: 13px; line-height: 1.6; font-weight: 500; opacity: 0.9; }
        .story-task-box { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 12px; width: 100%; margin-top: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .task-label { color: #94A3B8; font-size: 10px; margin-bottom: 6px; font-weight: 600; }
        .task-options { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .task-option { padding: 10px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); color: white; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; text-align: center; }
        .task-option.correct-pick { border-color: var(--green); background: rgba(16,185,129,0.2); }
        .task-option.wrong-pick { border-color: var(--red); background: rgba(239,68,68,0.2); animation: shake 0.5s ease; }
        .story-next-btn { width: 100%; padding: 10px; color: white; border: none; font-size: 13px; font-weight: 800; cursor: pointer; font-family: inherit; display: none; align-items: center; justify-content: center; gap: 3px; }
        .story-next-btn.math-next { background: var(--math-primary); }
        .story-next-btn.rus-next { background: var(--rus-primary); }
        .story-next-btn.show { display: flex; }
        .story-finish { display: none; flex-direction: column; align-items: center; padding: 16px; text-align: center; color: white; }
        .story-finish.show { display: flex; }
        .btn-finish-story { padding: 10px 26px; border: none; border-radius: 12px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit; color: white; box-shadow: 0 3px 0 rgba(0,0,0,0.2); }
        .btn-finish-story.math-finish { background: var(--math-primary); }
        .btn-finish-story.rus-finish { background: var(--rus-primary); }
        .btn-finish-story:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.2); }
        .task-input-row { display: flex; gap: 6px; }
        .task-input { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.25); background: rgba(255,255,255,0.08); color: white; font-size: 15px; text-align: center; font-weight: 700; outline: none; font-family: inherit; }
        .btn-submit { padding: 10px 16px; background: var(--gold); color: #0F172A; border: none; border-radius: 8px; font-weight: 800; font-size: 13px; cursor: pointer; font-family: inherit; }
        .explanation-box { display: none; margin-top: 8px; padding: 8px 10px; background: rgba(255,255,255,0.08); border-radius: 8px; font-size: 11px; line-height: 1.5; text-align: left; border-left: 3px solid var(--gold); animation: fadeIn 0.4s ease; }
        .explanation-box.show { display: block; }
        .explanation-box.good { border-left-color: var(--green); background: rgba(16,185,129,0.1); }
        .explanation-box.bad { border-left-color: var(--red); background: rgba(239,68,68,0.1); }

        /* ЛОВУШКИ */
        .trap-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 12px; margin-bottom: 6px; cursor: pointer; transition: all 0.2s; background: white; border: 2px solid #F1F5F9; box-shadow: var(--shadow-sm); }
        .trap-item:active { transform: scale(0.97); }
        .trap-item.danger { border-color: #FECACA; background: #FFF5F5; }
        .trap-item.warning { border-color: #FEF3C7; background: #FFFBEB; }
        .trap-item.defused { opacity: 0.55; background: #F8FAFC; }
        .trap-icon { font-size: 26px; flex-shrink: 0; }
        .trap-info { flex: 1; min-width: 0; }
        .trap-name { font-size: 12px; font-weight: 700; color: var(--text); }
        .trap-source { font-size: 10px; color: var(--text-light); }
        .trap-status { font-size: 9px; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .status-danger { background: #FEE2E2; color: #991B1B; }
        .status-warning { background: #FEF3C7; color: #92400E; }
        .status-defused { background: #F1F5F9; color: #64748B; }
        .trap-quiz-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.9); z-index: 400; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .trap-quiz-overlay.active { opacity: 1; pointer-events: all; }
        .trap-quiz-card { background: #0F172A; border-radius: 22px; padding: 18px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: white; }
        .trap-quiz-emoji { font-size: 42px; margin-bottom: 6px; }
        .trap-quiz-title { color: var(--gold); font-weight: 800; font-size: 14px; margin-bottom: 3px; }
        .trap-quiz-text { color: #94A3B8; font-size: 12px; margin-bottom: 12px; }
        .trap-quiz-options { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .trap-quiz-option { padding: 11px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); color: white; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: inherit; }
        .trap-quiz-option.correct-pick { border-color: var(--green); background: rgba(16,185,129,0.2); }
        .trap-quiz-option.wrong-pick { border-color: var(--red); background: rgba(239,68,68,0.2); animation: shake 0.5s ease; }
        .trap-quiz-explanation { display: none; margin-top: 10px; padding: 10px 12px; background: rgba(255,255,255,0.08); border-radius: 10px; font-size: 12px; line-height: 1.5; text-align: left; border-left: 3px solid var(--gold); animation: fadeIn 0.4s ease; }
        .trap-quiz-explanation.show { display: block; }
        .trap-quiz-explanation.good { border-left-color: var(--green); background: rgba(16,185,129,0.1); }
        .trap-quiz-explanation.bad { border-left-color: var(--red); background: rgba(239,68,68,0.1); }
        .btn-trap-quiz-close { margin-top: 10px; padding: 10px 24px; background: rgba(255,255,255,0.08); color: white; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
        .profile-header { text-align: center; padding: 14px; border-radius: 14px; margin-bottom: 12px; }
        .profile-header.math-prof { background: linear-gradient(135deg, #EFF6FF, #DBEAFE); }
        .profile-header.rus-prof { background: linear-gradient(135deg, #F5F3FF, #EDE9FE); }
        .profile-cat { font-size: 48px; }
        .profile-name { font-size: 15px; font-weight: 800; }
        .profile-stats { display: flex; justify-content: center; gap: 12px; margin-top: 8px; }
        .profile-stat { text-align: center; }
        .profile-stat-val { font-size: 16px; font-weight: 800; }
        .profile-stat-val.math-val { color: var(--math-primary); }
        .profile-stat-val.rus-val { color: var(--rus-primary); }
        .profile-stat-label { font-size: 9px; color: var(--text-light); font-weight: 600; }
        .ach-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
        .ach-item { text-align: center; padding: 10px 3px; border-radius: 10px; background: #F8FAFC; }
        .ach-item.unlocked { background: #FFFBEB; box-shadow: 0 2px 6px rgba(251,191,36,0.1); }
        .ach-icon { font-size: 24px; margin-bottom: 2px; }
        .ach-item.locked .ach-icon { filter: grayscale(1); opacity: 0.35; }
        .ach-name { font-size: 9px; font-weight: 700; color: var(--text); }
        .ach-item.locked .ach-name { color: #CBD5E1; }
        .ach-desc { font-size: 8px; color: var(--text-light); }
    </style>
</head>
<body>
    <div class="app" id="app">
        <div class="header math-header" id="headerBar"><div class="header-top"><div class="header-left"><div class="cat-avatar" id="catAvatar">🐱</div><div class="header-app-name">Кот Учёный</div></div><div class="header-stats"><div class="stat"><span>🔥</span><span id="streakCount">7</span></div><div class="stat"><span>💎</span><span id="gemCount">245</span></div></div></div><div class="subject-switch"><button class="subject-btn active" id="btnMath"><span>🧮</span>Математика</button><button class="subject-btn" id="btnRus"><span>📝</span>Русский</button></div></div>

        <div class="main-content"><div class="section-title"><span>🌳</span>Дерево навыков</div><div id="skillTree"></div></div>
        <div class="bottom-nav"><button class="nav-btn active" id="navHome"><span class="nav-icon">🏠</span>Главная</button><button class="nav-btn" id="navStories"><span class="nav-icon">📖</span>Истории</button><button class="nav-btn" id="navTraps" style="position:relative;"><span class="nav-icon">🪤</span>Ловушки<span class="nav-badge" id="trapsBadge" style="display:none;">0</span></button><button class="nav-btn" id="navProfile"><span class="nav-icon">👤</span>Профиль</button></div>

    <div class="lesson-overlay" id="lessonOverlay"><div class="lesson-container math-lesson" id="lessonContainer"><div class="lesson-header math-bar" id="lessonHeader"><span class="lesson-title" id="lessonTitle">📚</span><div style="display:flex;align-items:center;gap:6px;"><div class="lesson-steps" id="lessonSteps"></div><button class="lesson-close" id="lessonCloseBtn">✕</button></div></div><div class="lesson-scene" id="lessonScene"></div><button class="lesson-next math-next" id="lessonNextBtn">Далее ▸</button><div class="lesson-finish" id="lessonFinishBlock"><div class="finish-emoji">🎉</div><div class="finish-title" id="lfinishTitle">Урок пройден!</div><div class="finish-xp" id="lfinishXP"></div><div class="finish-subtitle" id="lfinishSubtitle"></div><div class="finish-stats"><div class="finish-stat"><div class="finish-stat-val" style="color:var(--green);" id="lfinishCorrect">0</div><div class="finish-stat-label">Верно</div></div><div class="finish-stat"><div class="finish-stat-val" style="color:var(--red);" id="lfinishWrong">0</div><div class="finish-stat-label">Ошибок</div></div></div><button class="btn-lesson-finish math-finish" id="btnLessonFinish">Завершить</button></div></div></div>
    <div class="story-overlay" id="storyOverlay"><div class="story-container math-story" id="storyContainer"><div class="story-header-bar math-bar" id="storyHeaderBar"><span class="story-title-header" id="storyTitleHeader">🕵️</span><div style="display:flex;align-items:center;gap:6px;"><div class="story-steps" id="storySteps"></div><button class="story-close-btn" id="storyCloseBtn">✕</button></div></div><div class="story-scene" id="storyScene"></div><button class="story-next-btn math-next" id="storyNextBtn">Далее ▸</button><div class="story-finish" id="storyFinishBlock2"><div class="finish-emoji">🏆</div><div class="finish-title" id="finishTitle"></div><div class="finish-xp" id="finishXP"></div><div class="finish-subtitle" id="finishSubtitle"></div><button class="btn-finish-story math-finish" id="btnFinishStory">Завершить</button></div></div></div>
    <div class="panel-overlay" id="storyPanel"><div class="panel-card"><div class="panel-title">📖 Истории</div><div class="panel-subtitle" id="storyPanelSubtitle"></div><div id="storyList"></div><button class="panel-close" id="btnStoryPanelClose">Закрыть</button></div></div>
    <div class="panel-overlay" id="trapsPanel"><div class="panel-card"><div class="panel-title">🪤 Ловушки</div><div class="panel-subtitle" id="trapsSubtitle"></div><div id="trapsList"></div><button class="panel-close" id="btnTrapsPanelClose">Закрыть</button></div></div>
    <div class="panel-overlay" id="profilePanel"><div class="panel-card"><div id="profileContent"></div><button class="panel-close" id="btnProfilePanelClose">Закрыть</button></div></div>
    <div class="trap-quiz-overlay" id="trapQuizOverlay"><div class="trap-quiz-card" id="trapQuizCard"></div></div>

    <script>
        (function() {
            const $=s=>document.querySelector(s),$$=s=>document.querySelectorAll(s),rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,shuffle=a=>[...a].sort(()=>Math.random()-0.5);
            const state={
                subject:'math',streak:7,gems:245,currentStory:null,storyStep:0,storyAnswered:false,
                storiesCompleted:{math:false,rus1:false,rus2:false},
                traps:[],totalPets:0,currentLesson:null,lessonStep:0,lessonTasks:[],lessonCorrect:0,lessonWrong:0,lessonSkillId:null,
                lastWrongTask:null,_bonusAdded:false,_wrongTasks:[],_bonusCorrect:0,
                achievements:{
                    detective:{id:'detective',name:'🕵️ Детектив',desc:'Пройти 1 историю',unlocked:!1},
                    sherlock:{id:'sherlock',name:'🔍 Шерлок',desc:'Пройти 2 истории',unlocked:!1},
                    holmes:{id:'holmes',name:'🎩 Холмс',desc:'Пройти 3 истории',unlocked:!1},
                    saper:{id:'saper',name:'🪤 Сапёр',desc:'Обезвредить ловушку',unlocked:!1},
                    hunter:{id:'hunter',name:'💣 Охотник',desc:'Обезвредить 3',unlocked:!1},
                    murmur:{id:'murmur',name:'🐱 Мур-мур',desc:'Погладить 10 раз',unlocked:!1},
                    erudite:{id:'erudite',name:'📚 Эрудит',desc:'Переключить 5 раз',unlocked:!1},
                    firstBlood:{id:'firstBlood',name:'💎 Первая кровь',desc:'Ошибка → ловушки',unlocked:!1},
                    student:{id:'student',name:'🎓 Ученик',desc:'Пройти 1 урок',unlocked:!1},
                    master:{id:'master',name:'🏅 Мастер',desc:'Урок без ошибок',unlocked:!1},
                },
                skills:{
                    math:[
                        {id:'add',name:'Сложение',icon:'➕',color:'#3B82F6',progress:0,status:'current'},
                        {id:'sub',name:'Вычитание',icon:'➖',color:'#EF4444',progress:0,status:'locked'},
                        {id:'mul',name:'Умножение',icon:'✖️',color:'#F59E0B',progress:0,status:'locked'},
                        {id:'div',name:'Деление',icon:'➗',color:'#8B5CF6',progress:0,status:'locked'},
                        {id:'eq',name:'Уравнения',icon:'⚖️',color:'#EC4899',progress:0,status:'locked'},
                        {id:'geom',name:'Периметр и площадь',icon:'📐',color:'#14B8A6',progress:0,status:'locked'},
                        {id:'frac',name:'Дроби',icon:'🍕',color:'#F97316',progress:0,status:'locked'},
                    ],
                    russian:[
                        {id:'zhishi',name:'ЖИ/ШИ, ЧА/ЩА, ЧУ/ЩУ',icon:'✍️',color:'#7C3AED',progress:0,status:'current'},
                        {id:'soft',name:'Разделительный Ь и Ъ',icon:'🔤',color:'#8B5CF6',progress:0,status:'locked'},
                        {id:'vowel',name:'Безударные гласные',icon:'🔍',color:'#F59E0B',progress:0,status:'locked'},
                        {id:'silent',name:'Непроизносимые согласные',icon:'🤫',color:'#EC4899',progress:0,status:'locked'},
                        {id:'tsya',name:'-ТСЯ/-ТЬСЯ',icon:'🔄',color:'#14B8A6',progress:0,status:'locked'},
                        {id:'prepri',name:'ПРЕ/ПРИ',icon:'🎯',color:'#F97316',progress:0,status:'locked'},
                        {id:'nn',name:'Н и НН',icon:'📋',color:'#EF4444',progress:0,status:'locked'},
                    ]
                }
            };

            function makeWrongs(c,n=3){const w=new Set();while(w.size<n){const x=c+rnd(-8,8);if(x!==c&&x>=0&&!w.has(x))w.add(x);}return[...w];}
            function choiceT(emoji,badge,bc,q,correct,expl){const o=shuffle([correct,...makeWrongs(correct)]);return{type:'choice',emoji,badge,badgeClass:bc,question:q,options:o,correctIdx:o.indexOf(correct),correctAns:correct,explanation:expl};}
            function inputT(emoji,badge,bc,q,correct,expl){return{type:'input',emoji,badge,badgeClass:bc,question:q,correctAns:correct,explanation:expl};}
            function pairT(emoji,badge,bc,q,pairs,expl){return{type:'pair',emoji,badge,badgeClass:bc,question:q,pairs,explanation:expl};}

            function generateLesson(skillId,subject){
                if(subject==='math'){
                    if(skillId==='add')return generateAddLesson();
                    if(skillId==='sub')return generateSubLesson();
                    if(skillId==='mul')return generateMulLesson();
                    if(skillId==='div')return generateDivLesson();
                    if(skillId==='eq')return generateEqLesson();
                    if(skillId==='geom')return generateGeomLesson();
                    if(skillId==='frac')return generateFracLesson();
                    return generateAddLesson();
                }
                if(skillId==='zhishi')return generateZhishiLesson();
                if(skillId==='soft')return generateSoftLesson();
                if(skillId==='vowel')return generateVowelLesson();
                if(skillId==='silent')return generateSilentLesson();
                if(skillId==='tsya')return generateTsyaLesson();
                if(skillId==='prepri')return generatePrepriLesson();
                if(skillId==='nn')return generateNNLesson();
                return generateZhishiLesson();
            }

            // ═══════════════ МАТЕМАТИКА ═══════════════

            function generateAddLesson(){
                const t=[],g=()=>[rnd(2,20),rnd(2,20)],add=(a,b)=>a+b;
                const[a1,b1]=g();t.push(choiceT('🔥','Разминка','badge-warmup',`${a1} + ${b1} = ?`,add(a1,b1),`${a1}+${b1}=${add(a1,b1)}`));
                const[a2,b2]=g();t.push(choiceT('🖼️','Визуальное','badge-visual',`У тебя ${a2} 🍎, дали ещё ${b2}. Сколько?`,add(a2,b2),`${a2}+${b2}=${add(a2,b2)}`));
                const[a3,b3]=g();t.push(choiceT('🎯','Выбор','badge-choice',`${a3} + ${b3} = ?`,add(a3,b3),`${a3}+${b3}=${add(a3,b3)}`));
                const pd=[],ua=new Set();while(pd.length<3){const[a,b]=[rnd(2,15),rnd(2,15)],ans=add(a,b);if(!ua.has(ans)){ua.add(ans);pd.push({left:`${a} + ${b}`,right:`${ans}`,answer:ans});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини примеры с ответами:',pd,'Нажимай левый → правый'));
                const trapNum=rnd(5,20);t.push(choiceT('⚠️','Ловушка','badge-trap',`${trapNum} + 0 = ?`,trapNum,'Число + 0 = то же число!'));
                const[a6,b6]=g();t.push(inputT('✏️','Ввод','badge-input',`${a6} + ${b6} = ?`,add(a6,b6),`${a6}+${b6}=${add(a6,b6)}`));
                const[a7,b7]=g();t.push(inputT('✏️','Ввод','badge-input',`${a7} + ${b7} = ?`,add(a7,b7),`${a7}+${b7}=${add(a7,b7)}`));
                const[c1,c2]=[rnd(10,50),rnd(10,50)];t.push(inputT('⭐','Босс','badge-boss',`У Маши ${c1} руб, у Пети ${c2} руб. Сколько вместе?`,add(c1,c2),`${c1}+${c2}=${add(c1,c2)}`));
                return t;
            }

            function generateSubLesson(){
                const t=[],g=()=>{const a=rnd(10,40),b=rnd(1,a-1);return[a,b];},sub=(a,b)=>a-b;
                const[a1,b1]=g();t.push(choiceT('🔥','Разминка','badge-warmup',`${a1} - ${b1} = ?`,sub(a1,b1),`${a1}-${b1}=${sub(a1,b1)}`));
                const[a2,b2]=g();t.push(choiceT('🖼️','Визуальное','badge-visual',`Было ${a2} 🍎, съели ${b2}. Сколько осталось?`,sub(a2,b2),`${a2}-${b2}=${sub(a2,b2)}`));
                const[a3,b3]=g();t.push(choiceT('🎯','Выбор','badge-choice',`${a3} - ${b3} = ?`,sub(a3,b3),`${a3}-${b3}=${sub(a3,b3)}`));
                const pd=[],ua=new Set();while(pd.length<3){const[a,b]=[rnd(10,30),rnd(1,a-1)],ans=sub(a,b);if(!ua.has(ans)){ua.add(ans);pd.push({left:`${a} - ${b}`,right:`${ans}`,answer:ans});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини примеры с ответами:',pd,'Нажимай левый → правый'));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`${rnd(10,30)} - ${rnd(10,30)} = ?`,0,'Одинаковые числа — разность 0!'));
                const[a6,b6]=g();t.push(inputT('✏️','Ввод','badge-input',`${a6} - ${b6} = ?`,sub(a6,b6),`${a6}-${b6}=${sub(a6,b6)}`));
                const[a7,b7]=g();t.push(inputT('✏️','Ввод','badge-input',`${a7} - ${b7} = ?`,sub(a7,b7),`${a7}-${b7}=${sub(a7,b7)}`));
                const[total,spent]=[rnd(30,80),rnd(5,total-10)];t.push(inputT('⭐','Босс','badge-boss',`Было ${total} руб, потратили ${spent} руб. Сколько осталось?`,sub(total,spent),`${total}-${spent}=${sub(total,spent)}`));
                return t;
            }

            function generateMulLesson(){
                const t=[],g=()=>[rnd(2,10),rnd(2,10)],mul=(a,b)=>a*b;
                const[a1,b1]=g();t.push(choiceT('🔥','Разминка','badge-warmup',`${a1} × ${b1} = ?`,mul(a1,b1),`${a1}×${b1}=${mul(a1,b1)}`));
                const[a2,b2]=g();t.push(choiceT('🖼️','Визуальное','badge-visual',`${a2} группы по ${b2} 🍎. Сколько?`,mul(a2,b2),`${a2}×${b2}=${mul(a2,b2)}`));
                const[a3,b3]=g();t.push(choiceT('🎯','Выбор','badge-choice',`${a3} × ${b3} = ?`,mul(a3,b3),`${a3}×${b3}=${mul(a3,b3)}`));
                const pd=[],ua=new Set();while(pd.length<3){const[a,b]=[rnd(2,9),rnd(2,9)],ans=mul(a,b);if(!ua.has(ans)){ua.add(ans);pd.push({left:`${a} × ${b}`,right:`${ans}`,answer:ans});}}
                t.push(pairT('🔗','Парное','badge-pair','Соедини примеры с ответами:',pd,'Нажимай левый → правый'));
                t.push(choiceT('⚠️','Ловушка','badge-trap',`${rnd(2,9)} × 0 = ?`,0,'Любое число × 0 = 0!'));
                const[a6,b6]=g();t.push(inputT('✏️','Ввод','badge-input',`${a6} × ${b6} = ?`,mul(a6,b6),`${a6}×${b6}=${mul(a6,b6)}`));
                const[a7,b7]=g();t.push(inputT('✏️','Ввод','badge-input',`${a7} × ${b7} = ?`,mul(a7,b7),`${a7}×${b7}=${mul(a7,b7)}`));
                const[sh,bs]=[rnd(2,5),rnd(4,10)];t.push(inputT('⭐','Босс','badge-boss',`${sh} полки по ${bs} книг. Сколько всего?`,mul(sh,bs),`${sh}×${bs}=${mul(sh,bs)} книг`));
                return t;
            }

            function generateDivLesson(){
                const t=[],g=()=>{const b=rnd(2,9),c=rnd(2,9);return[b*c,b];},div=(a,b)=>a/b;

                else if(task.type==='pair'){const ls=shuffle(task.pairs.map((p,i)=>({text:p.left,idx:i}))),rs=shuffle(task.pairs.map((p,i)=>({text:p.right,idx:i})));h+=`<div class="pair-grid"><div class="pair-left" id="pairLeft">${ls.map(l=>`<button class="pair-item" data-pair-idx="${l.idx}" data-side="left">${l.text}</button>`).join('')}</div><div class="pair-right" id="pairRight">${rs.map(r=>`<button class="pair-item" data-pair-idx="${r.idx}" data-side="right">${r.text}</button>`).join('')}</div></div><div style="font-size:10px;opacity:0.6;margin-top:4px;">Нажимай: левый → правый</div>`;}

                h+=`<div class="lesson-explanation" id="lexpl"></div>`;$('#lessonScene').innerHTML=h;
                const expl=$('#lexpl');let answered=!1;
                if(task.type==='choice'){const opts=$$('#lopts .lesson-option');opts.forEach(o=>o.addEventListener('click',()=>{if(answered)return;answered=!0;opts.forEach(x=>x.style.pointerEvents='none');const idx=parseInt(o.dataset.idx);if(idx===task.correctIdx){o.classList.add('correct-pick');if(task.isBonus){state._bonusCorrect++;}else{state.lessonCorrect++;}if(expl){expl.textContent='✅ '+task.explanation;expl.className='lesson-explanation show good';}}else{o.classList.add('wrong-pick');opts[task.correctIdx].classList.add('correct-pick');if(!task.isBonus){state.lessonWrong++;state._wrongTasks.push(task);}else{state._bonusCorrect--;}if(expl){expl.textContent='🤔 '+task.explanation;expl.className='lesson-explanation show bad';}if(!task.isBonus)addLessonTrap(task);}updateDots();setTimeout(()=>$('#lessonNextBtn').classList.add('show'),1000);}));}

                else if(task.type==='input'){const inp=$('#linp'),btn=$('#lsub');const sub=()=>{if(answered)return;const v=inp.value.trim().toLowerCase();if(!v){inp.style.borderColor='var(--red)';inp.style.animation='shake 0.5s ease';setTimeout(()=>{inp.style.animation='';inp.style.borderColor='rgba(255,255,255,0.25)';},500);return;}answered=!0;btn.disabled=!0;inp.disabled=!0;const cs=String(task.correctAns).toLowerCase();const ic=(v===cs)||(cs.includes(',')&&v===cs.replace(/,/g,''));if(ic){inp.style.borderColor='var(--green)';inp.style.background='rgba(16,185,129,0.2)';if(task.isBonus){state._bonusCorrect++;}else{state.lessonCorrect++;}if(expl){expl.textContent='✅ '+task.explanation;expl.className='lesson-explanation show good';}}else{inp.style.borderColor='var(--red)';inp.style.background='rgba(239,68,68,0.15)';if(!task.isBonus){state.lessonWrong++;state._wrongTasks.push(task);}else{state._bonusCorrect--;}if(expl){expl.textContent='🤔 '+task.explanation+' Правильно: '+task.correctAns;expl.className='lesson-explanation show bad';}if(!task.isBonus)addLessonTrap(task);}updateDots();setTimeout(()=>$('#lessonNextBtn').classList.add('show'),1000);};btn.addEventListener('click',sub);inp.addEventListener('keydown',e=>{if(e.key==='Enter')sub();});}
                else if(task.type==='boss_tsya'||task.type==='boss_prepri'||task.type==='boss_zhishi'||task.type==='boss_nn'||task.type==='boss_soft'||task.type==='boss_vowel'||task.type==='boss_silent'){const inputs=$$('.boss-input');const btn=$('#lsub');const sub=()=>{if(answered)return;let allOk=true;task.words.forEach((w,wi)=>{const v=inputs[wi].value.trim().toLowerCase();if(v!==w.answer){allOk=false;inputs[wi].style.borderColor='var(--red)';inputs[wi].style.background='rgba(239,68,68,0.15)';}else{inputs[wi].style.borderColor='var(--green)';inputs[wi].style.background='rgba(16,185,129,0.2)';}});if(allOk){if(task.isBonus){state._bonusCorrect++;}else{state.lessonCorrect++;}}else{if(!task.isBonus){state.lessonWrong++;state._wrongTasks.push(task);}else{state._bonusCorrect--;}}answered=true;btn.disabled=true;inputs.forEach(i=>i.disabled=true);if(expl){expl.textContent=allOk?'✅ '+task.explanation:'🤔 '+task.explanation;expl.className='lesson-explanation show '+(allOk?'good':'bad');}if(!allOk&&!task.isBonus)addLessonTrap(task);updateDots();setTimeout(()=>$('#lessonNextBtn').classList.add('show'),1000);};btn.addEventListener('click',sub);inputs.forEach(inp=>{inp.addEventListener('keydown',e=>{if(e.key==='Enter')sub();});});}

            function updateDots(){const d=$$('#lessonSteps .lstep-dot');d.forEach((x,i)=>{x.classList.remove('done','current','wrong','bonus');if(i<state.lessonStep)x.classList.add('done');else if(i===state.lessonStep)x.classList.add(state.lessonWrong>0?'wrong':'current');});}
            function addLessonTrap(task){const id='lesson_'+state.lessonSkillId+'_'+Date.now()+'_'+Math.random();state.traps.push({id,question:task.question,options:task.options||null,correct:task.correctIdx??null,answer:task.correctAns,explanation:task.explanation,source:'Урок: '+$('#lessonTitle').textContent,defuses:0,nextDate:new Date().toISOString(),isInput:task.type==='input'||task.type?.startsWith('boss'),subject:state.subject});unlockAch('firstBlood');}

            function renderTrapsPanel(){const av=getAvail(),lo=getLocked(),de=getDefused();let h='';if(!av.length&&!lo.length&&!de.length)h='<div style="text-align:center;padding:20px;">🏆<br>Пусто!</div>';else{if(av.length){h+='<p style="font-weight:700;color:var(--red);margin-bottom:6px;">🔴 Ожидают</p>';av.forEach(t=>{h+=`<div class="trap-item danger" data-id="${t.id}"><div class="trap-icon">🪤</div><div class="trap-info"><div class="trap-name">${t.question}</div><div class="trap-source">${t.source} | ${t.defuses}/4</div></div><span class="trap-status status-danger">Ждёт!</span></div>`;});}if(lo.length){h+='<p style="font-weight:700;color:var(--orange);margin:10px 0 6px;">🟡 Пауза</p>';lo.forEach(t=>{const hrs=Math.ceil((new Date(t.nextDate)-new Date())/3600000);h+=`<div class="trap-item warning"><div class="trap-icon">⏳</div><div class="trap-info"><div class="trap-name">${t.question}</div><div class="trap-source">Через ~${hrs}ч | ${t.defuses}/4</div></div><span class="trap-status status-warning">Пауза</span></div>`;});}if(de.length){h+='<p style="font-weight:700;color:var(--green);margin:10px 0 6px;">🟢 Обезврежены</p>';de.forEach(t=>{h+=`<div class="trap-item defused"><div class="trap-icon">✅</div><div class="trap-info"><div class="trap-name">${t.question}</div><div class="trap-source">${t.source}</div></div><span class="trap-status status-defused">Готово</span></div>`;});}}$('#trapsList').innerHTML=h;$('#trapsSubtitle').textContent=av.length?`${av.length} ловушка(и) ждёт!`:'';$$('#trapsList .trap-item.danger').forEach(el=>{el.addEventListener('click',()=>{const t=state.traps.find(x=>x.id===el.dataset.id);if(t)openTrapQuiz(t);});});}
            function openTrapQuiz(trap){let h=`<div class="trap-quiz-emoji">🪤</div><div class="trap-quiz-title">Обезвреживание ${trap.defuses+1}/4</div><div class="trap-quiz-text">${trap.question}</div>`;if(trap.isInput)h+=`<div class="task-input-row"><input type="text" class="task-input" id="tqInp" placeholder="Ответ" autocomplete="off"><button class="btn-submit" id="tqSub">✓</button></div>`;else h+=`<div class="trap-quiz-options" id="tqOpts">${trap.options.map((o,i)=>`<button class="trap-quiz-option" data-idx="${i}">${o}</button>`).join('')}</div>`;h+=`<div class="trap-quiz-explanation" id="tqExpl"></div><button class="btn-trap-quiz-close" id="tqClose">Закрыть</button>`;$('#trapQuizCard').innerHTML=h;$('#trapQuizOverlay').classList.add('active');const expl=$('#tqExpl');let done=!1;const success=()=>{trap.defuses++;trap.nextDate=new Date(Date.now()+getInt(trap.defuses)*86400000).toISOString();state.gems+=5+trap.defuses*3;updateStats();showToast(trap.defuses>=4?'🏆':'✅',trap.defuses>=4?'Готово!':`+${5+trap.defuses*3} 💎`);checkAchs();updateTrapsBadge();renderTrapsPanel();setTimeout(()=>$('#trapQuizOverlay').classList.remove('active'),600);};if(trap.isInput){const inp=$('#tqInp'),btn=$('#tqSub');const sub=()=>{if(done)return;done=!0;btn.disabled=!0;inp.disabled=!0;if(inp.value.trim().toLowerCase()===String(trap.answer).toLowerCase()){inp.style.borderColor='var(--green)';inp.style.background='rgba(16,185,129,0.2)';if(expl){expl.textContent='✅ '+trap.explanation;expl.className='trap-quiz-explanation show good';}success();}else{inp.style.borderColor='var(--red)';inp.style.background='rgba(239,68,68,0.15)';if(expl){expl.textContent='🤔 '+trap.explanation;expl.className='trap-quiz-explanation show bad';}}};btn.addEventListener('click',sub);inp.addEventListener('keydown',e=>{if(e.key==='Enter')sub();});}else{const opts=$$('#tqOpts .trap-quiz-option');opts.forEach(o=>o.addEventListener('click',()=>{if(done)return;done=!0;opts.forEach(x=>x.style.pointerEvents='none');const idx=             const storySrc={math:{id:'math',title:'🧮 Дело о пропавшем торте',subj:'math',scenes:[{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Мур! Украли торт!'},{type:'choice',speaker:'Следователь',emoji:'🔍',text:'3 ряда по 8 следов.',question:'3×8=?',options:['18','24','28','32'],correct:1,explanation:'3×8=24 🐾',trapId:'smul'},{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'24 следа! Трое подозреваемых.'},{type:'input',speaker:'Бухгалтер',emoji:'🧾',text:'Торт 120 монет. Вор оставил половину.',question:'120÷2=?',answer:'60',explanation:'120÷2=60 💰',trapId:'sdiv'},{type:'choice',speaker:'Сорока',emoji:'🦜',text:'4 друга × 2 куска. Торт на 8.',question:'Хватит?',options:['Да','Нет','Ровно 8','Больше'],correct:2,explanation:'4×2=8! 🍰',trapId:'slog'},{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Енот! Дело закрыто! 🎉'}]},rus1:{id:'rus1',title:'📝 Дело о пропавшей запятой',subj:'russian',scenes:[{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Из газеты исчезли запятые!'},{type:'choice',speaker:'Редактор',emoji:'📰',text:'"Кот пр...бывает".',question:'ПРЕ или ПРИ?',options:['Е','И','Ы','Э'],correct:1,explanation:'ПРИбывает 🚂',trapId:'rpre'},{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Дальше — ресторан...'},{type:'choice',speaker:'Критик',emoji:'🍽️',text:'"Кури...ый суп".',question:'Н или НН?',options:['Н','НН'],correct:0,explanation:'Одна Н — суффикс -ИН- 🐔',trapId:'rnn'},{type:'choice',speaker:'Секретарша',emoji:'💼',text:'"Казнить нельзя помиловать".',question:'Где запятая?',options:['Казнить, нельзя','Казнить нельзя,','Казнить нельзя помиловать,','Не нужна'],correct:1,explanation:'После «нельзя»! ☠️→😇',trapId:'rcom'},{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Язык спасён! 🎉📚'}]},rus2:{id:'rus2',title:'📝 Дело о двойных согласных',subj:'russian',scenes:[{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Мур! В библиотеке пропали буквы Н!'},{type:'choice',speaker:'Библиотекарь',emoji:'📚',text:'"Стекля...ый стакан".',question:'Н или НН?',options:['Н','НН'],correct:1,explanation:'СтекляННый — исключение! 🔮',trapId:'rnn2'},{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Ого! Исключение!'},{type:'choice',speaker:'Писатель',emoji:'✍️',text:'"Ветре...ый день".',question:'Н или НН?',options:['Н','НН'],correct:0,explanation:'ВетреНый — одна Н 🌬️',trapId:'rnn3'},{type:'input',speaker:'Поэт',emoji:'🎭',text:'"Пусты...ый пляж". Впиши: н или нн',question:'Сколько Н?',answer:'нн',explanation:'ПустыННый — стык корня и суффикса 🏖️',trapId:'rnn4'},{type:'dialogue',speaker:'Кот',emoji:'🐱',text:'Все буквы на месте! 🎉'}]}};
            const storyList={math:[storySrc.math],russian:[storySrc.rus1,storySrc.rus2]};
            function openStoryPanel(){const im=state.subject==='math';$('#storyPanelSubtitle').textContent=im?'Математические расследования':'Расследования по русскому';const list=storyList[state.subject];$('#storyList').innerHTML=list.map(s=>{const done=state.storiesCompleted[s.id];return`<div class="story-card" data-story="${s.id}"><div class="story-card-icon">${im?'🧮':'📝'}</div><div class="story-card-info"><div class="story-card-name">${s.title}</div><div class="story-card-desc">${s.scenes.filter(x=>x.type!=='dialogue').length} задания</div></div><span class="story-card-badge ${done?'badge-done':'badge-new'}">${done?'✅':'🔄'}</span></div>`;}).join('');$$('#storyList .story-card').forEach(c=>c.addEventListener('click',()=>startStory(c.dataset.story)));$('#storyPanel').classList.add('active');}
            function startStory(id){const scr=storySrc[Object.keys(storySrc).find(k=>storySrc[k].id===id)];state.currentStory=id;state.storyStep=0;state.storyAnswered=!1;const im=scr.subj==='math';$('#storyContainer').className='story-container '+(im?'math-story':'rus-story');$('#storyHeaderBar').className='story-header-bar '+(im?'math-bar':'rus-bar');$('#storyTitleHeader').textContent=scr.title;$('#storySteps').innerHTML=Array.from({length:scr.scenes.length},(_,i)=>`<span class="step-dot ${i===0?'current':''}"></span>`).join('');$('#storyNextBtn').className='story-next-btn '+(im?'math-next':'rus-next');$('#btnFinishStory').className='btn-finish-story '+(im?'math-finish':'rus-finish');$('#storyOverlay').classList.add('active');$('#storyNextBtn').classList.remove('show');$('#storyFinishBlock2').classList.remove('show');$('#storyScene').style.display='flex';$('#storyPanel').classList.remove('active');renderStoryStep();}

            function renderStoryStep(){const scr=storySrc[Object.keys(storySrc).find(k=>storySrc[k].id===state.currentStory)];const step=scr.scenes[state.storyStep];if(!step)return finishStory();$('#storyNextBtn').classList.remove('show');$('#storyFinishBlock2').classList.remove('show');$('#storyScene').style.display='flex';state.storyAnswered=!1;let h=`<div class="scene-emoji">${step.emoji}</div><div class="scene-speaker">${step.speaker}</div><div class="scene-text">${step.text}</div>`;if(step.type==='choice')h+=`<div class="story-task-box"><div class="task-label">${step.question}</div><div class="task-options" id="taskOpts">${step.options.map((o,i)=>`<button class="task-option" data-idx="${i}">${o}</button>`).join('')}</div><div class="explanation-box" id="explBox"></div></div>`;else if(step.type==='input')h+=`<div class="story-task-box"><div class="task-label">${step.question}</div><div class="task-input-row"><input type="text" class="task-input" id="taskInp" placeholder="Ответ" autocomplete="off"><button class="btn-submit" id="btnSub">✓</button></div><div class="explanation-box" id="explBox"></div></div>`;else setTimeout(()=>$('#storyNextBtn').classList.add('show'),300);$('#storyScene').innerHTML=h;const expl=$('#explBox');let used=!1;const opts=$$('#taskOpts .task-option');opts.forEach(o=>o.addEventListener('click',()=>{if(state.storyAnswered)return;state.storyAnswered=!0;opts.forEach(x=>x.style.pointerEvents='none');const idx=parseInt(o.dataset.idx);if(idx===step.correct){o.classList.add('correct-pick');if(expl){expl.textContent='✅ '+step.explanation;expl.className='explanation-box show good';}state.gems+=5;updateStats();setTimeout(()=>$('#storyNextBtn').classList.add('show'),1000);}else{o.classList.add('wrong-pick');opts[step.correct].classList.add('correct-pick');if(expl){expl.textContent='🤔 '+step.explanation;expl.className='explanation-box show bad';}if(!used&&step.trapId){addStoryTrap(step,scr.title);used=!0;}showToast('🤔','Ошибка → Ловушки!');setTimeout(()=>$('#storyNextBtn').classList.add('show'),1800);}}));const inp=$('#taskInp'),btn=$('#btnSub');if(inp&&btn){let iut=!1;const sub=()=>{if(state.storyAnswered)return;const v=inp.value.trim();if(!v){inp.style.borderColor='var(--red)';inp.style.animation='shake 0.5s ease';setTimeout(()=>{inp.style.animation='';inp.style.borderColor='rgba(255,255,255,0.25)';},500);return;}state.storyAnswered=!0;btn.disabled=!0;inp.disabled=!0;if(v.toLowerCase()===step.answer.toLowerCase()){inp.style.borderColor='var(--green)';inp.style.background='rgba(16,185,129,0.2)';if(expl){expl.textContent='✅ '+step.explanation;expl.className='explanation-box show good';}state.gems+=5;updateStats();setTimeout(()=>$('#storyNextBtn').classList.add('show'),1000);}else{inp.style.borderColor='var(--red)';inp.style.background='rgba(239,68,68,0.15)';if(expl){expl.textContent='🤔 '+step.explanation;expl.className='explanation-box show bad';}if(!iut&&step.trapId){addStoryTrap(step,scr.title);iut=!0;}showToast('🤔','Ошибка → Ловушки!');setTimeout(()=>$('#storyNextBtn').classList.add('show'),1800);}};btn.addEventListener('click',sub);inp.addEventListener('keydown',e=>{if(e.key==='Enter')sub();});}updateStorySteps();$('#storyScene').scrollTop=0;}
            function addStoryTrap(step,src){if(!step.trapId)return;if(state.traps.find(t=>t.id===step.trapId))return;state.traps.push({id:step.trapId,question:step.question,options:step.options||null,correct:step.correct??null,answer:step.answer||null,explanation:step.explanation,source:src,defuses:0,nextDate:new Date().toISOString(),isInput:step.type==='input',subject:state.currentStory.startsWith('rus')?'russian':'math'});unlockAch('firstBlood');}

            function renderProfile(){const im=state.subject==='math';const done=(state.storiesCompleted.math?1:0)+(state.storiesCompleted.rus1?1:0)+(state.storiesCompleted.rus2?1:0);const def=state.traps.reduce((s,t)=>s+t.defuses,0);const unl=Object.values(state.achievements).filter(a=>a.unlocked).length;let h=`<div class="profile-header ${im?'math-prof':'rus-prof'}"><div class="profile-cat">${im?'🐱':'😺'}</div><div class="profile-name">Кот Учёный</div><div style="font-size:10px;color:var(--text-light);">${im?'Математик':'Филолог'}</div><div class="profile-stats"><div class="profile-stat"><div class="profile-stat-val ${im?'math-val':'rus-val'}">${done}</div><div class="profile-stat-label">Историй</div></div><div class="profile-stat"><div class="profile-stat-val ${im?'math-val':'rus-val'}">${def}</div><div class="profile-stat-label">Ловушек</div></div><div class="profile-stat"><div class="profile-stat-val ${im?'math-val':'rus-val'}">${unl}</div><div class="profile-stat-label">Ачивок</div></div></div></div>`;h+='<div style="font-weight:800;color:var(--text);margin-bottom:8px;">🏆 Достижения</div><div class="ach-grid">';Object.values(state.achievements).forEach(a=>{const cls=a.unlocked?'unlocked':'locked';h+=`<div class="ach-item ${cls}"><div class="ach-icon">${a.unlocked?a.name.split(' ')[0]:'🔒'}</div><div class="ach-name">${a.name.split(' ').slice(1).join(' ')}</div><div class="ach-desc">${a.desc}</div></div>`;});h+='</div>';$('#profileContent').innerHTML=h;}
